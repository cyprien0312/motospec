<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MotoSPEC Formula Explorer · 公式探索器</title>
<style>
  /* Apple-gallery light theme (docs/DESIGN-apple.md → ~/Documents):
     parchment canvas, white panels, near-black ink, ONE Action Blue for
     everything interactive, hairlines instead of shadows, system fonts
     (SF Pro on Apple devices). Diagrams / formula boxes stay near-black
     "dark tiles" — the Apple pattern of a dark product tile on a light
     page — so the SVG renderers' light strokes keep working unchanged. */
  :root {
    color-scheme: light;
    --bg: #f5f5f7;            /* parchment page canvas */
    --panel: #ffffff;         /* white cards / tables */
    --panel-2: #f5f5f7;       /* secondary surface */
    --border: #e0e0e0;        /* hairline */
    --divider: #f0f0f0;       /* soft inner-cell divider */
    --text: #1d1d1f;          /* ink */
    --text-dim: #6e6e73;      /* muted ink */
    --accent: #0066cc;        /* Action Blue — the single interactive color */
    --accent-hover: #0071e3;  /* focus blue */
    --accent-on-dark: #2997ff;/* sky link blue, dark tiles only */
    --channel: #c2410c;       /* semantic data colors, recalibrated for light */
    --intermediate: #7c3aed;
    --input: #15803d;
    --formula-bg: #ffffff;    /* unified white tile (matches --panel) */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    --sidebar-w: 264px;
    /* No decorative gradients — the parchment canvas IS the background. */
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Segoe UI", Inter, sans-serif;
    letter-spacing: -0.1px; /* the quiet "Apple tight" tracking */
    line-height: 1.47; min-height: 100vh;
    display: grid; grid-template-columns: var(--sidebar-w) 1fr;
    transition: grid-template-columns 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }
  body.sidebar-collapsed { --sidebar-w: 64px; }

  aside {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 16px 12px; height: 100vh; overflow-y: auto; overflow-x: hidden;
    position: sticky; top: 0;
    display: flex; flex-direction: column; gap: 12px;
  }
  .sidebar-brand {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-brand .brand-mark {
    width: 30px; height: 30px; flex-shrink: 0;
    border-radius: 8px;
    background: var(--accent);
    display: grid; place-items: center;
    font-weight: 600; font-size: 15px; color: #fff;
  }
  .sidebar-brand .brand-text {
    font-weight: 600; font-size: 15px; letter-spacing: -0.02em;
    color: var(--text); white-space: nowrap; overflow: hidden;
    transition: opacity 0.18s;
  }
  .sidebar-brand .brand-text small {
    display: block;
    font-size: 9px; font-weight: 500; letter-spacing: 0.14em;
    color: var(--text-dim); text-transform: uppercase; margin-top: 1px;
  }
  .sidebar-toggle {
    position: absolute; top: 14px; right: 10px;
    width: 22px; height: 22px; border-radius: 6px;
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text-dim); cursor: pointer; z-index: 10;
    display: grid; place-items: center;
    font-size: 12px; line-height: 1; transition: all 0.18s;
  }
  body.sidebar-collapsed .sidebar-toggle {
    position: relative; top: auto; right: auto; margin: 4px auto 0;
  }
  .sidebar-toggle:hover { color: var(--accent); border-color: var(--accent); transform: scale(1.08); }
  body.sidebar-collapsed .sidebar-toggle { transform: rotate(180deg); }
  body.sidebar-collapsed .sidebar-toggle:hover { transform: rotate(180deg) scale(1.08); }

  aside h2 {
    font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
    color: var(--text-dim); text-transform: uppercase;
    margin: 12px 4px 6px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 7px;
    cursor: pointer; color: var(--text); font-size: 13.5px; font-weight: 500;
    border: 1px solid transparent; transition: background 0.15s, border-color 0.15s, transform 0.15s;
    margin-bottom: 2px; position: relative; overflow: hidden;
    white-space: nowrap;
  }
  .nav-item .nav-icon {
    flex-shrink: 0; font-size: 16px; line-height: 1;
    width: 22px; text-align: center;
  }
  .nav-item .nav-text {
    display: flex; flex-direction: column; gap: 1px; min-width: 0; overflow: hidden;
    transition: opacity 0.18s;
  }
  .nav-item .nav-text strong { font-weight: 600; font-size: 13.5px; }
  .nav-item .nav-text .label { color: var(--text-dim); font-size: 11px; font-weight: 400; }
  .nav-item:hover { background: var(--panel-2); border-color: var(--border); }
  .nav-item:hover .nav-icon { transform: scale(1.1); }
  .nav-item.active {
    background: color-mix(in srgb, var(--accent) 8%, transparent);
    border-color: color-mix(in srgb, var(--accent) 30%, transparent);
  }
  .nav-item.active::before {
    content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
    width: 3px; background: var(--accent); border-radius: 0 3px 3px 0;
  }

  body.sidebar-collapsed aside { padding-left: 8px; padding-right: 8px; }
  body.sidebar-collapsed aside h2,
  body.sidebar-collapsed .brand-text,
  body.sidebar-collapsed .nav-text,
  body.sidebar-collapsed .lang-btn span.lang-full { display: none; }
  body.sidebar-collapsed .nav-item { justify-content: center; padding: 10px 6px; }
  body.sidebar-collapsed .nav-item .nav-icon { width: auto; }
  body.sidebar-collapsed .lang-bar { flex-direction: column; gap: 4px; padding-bottom: 8px; }
  body.sidebar-collapsed .lang-btn { padding: 5px 0; font-size: 10px; }

  main {
    padding: 24px clamp(20px, 3vw, 44px);
    width: 100%; min-width: 0;
  }
  .breadcrumbs {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 6px; margin-bottom: 20px; font-size: 13px; color: var(--text-dim);
  }
  .breadcrumbs .crumb {
    cursor: pointer; padding: 3px 8px; border-radius: 4px;
    color: var(--accent); transition: background 0.15s;
  }
  .breadcrumbs .crumb:hover { background: var(--panel-2); }
  .breadcrumbs .sep { color: var(--text-dim); }
  .breadcrumbs .crumb.current { color: var(--text); cursor: default; }

  .header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
  h1 { font-size: 28px; font-weight: 600; }
  .unit { color: var(--text-dim); font-size: 16px; font-weight: 400; }
  .label-zh { color: var(--text-dim); font-size: 16px; font-weight: 400; }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge.channel { background: rgba(255, 140, 90, 0.15); color: var(--channel); }
  .badge.intermediate { background: rgba(192, 132, 252, 0.15); color: var(--intermediate); }
  .badge.input { background: rgba(74, 222, 128, 0.15); color: var(--input); }

  .desc {
    color: var(--text-dim); margin-top: 12px; margin-bottom: 24px;
    padding: 14px 18px; background: var(--panel); border-left: 3px solid var(--accent);
    border-radius: 4px; font-size: 14px;
  }

  .section-title {
    font-size: 13px; font-weight: 600; letter-spacing: 1px; color: var(--text-dim);
    text-transform: uppercase; margin-top: 28px; margin-bottom: 12px;
  }
  .formula-box {
    /* White tile with a hairline, matching every other card on the page. */
    background: var(--formula-bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 18px; padding: 24px 28px; font-size: 19px;
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;
    line-height: 2.2; word-spacing: 2px; overflow-x: auto;
  }
  .param-chip {
    display: inline-block; padding: 2px 10px; border-radius: 5px;
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--accent); cursor: pointer; transition: all 0.15s;
    font-size: 17px; font-weight: 500; margin: 2px 1px;
  }
  .param-chip:hover {
    background: var(--accent); color: var(--bg); border-color: var(--accent);
    transform: translateY(-1px);
  }
  .param-chip.input { color: var(--input); }
  .param-chip.input:hover { background: var(--input); color: var(--bg); border-color: var(--input); }
  .param-chip.intermediate { color: var(--intermediate); }
  .param-chip.intermediate:hover { background: var(--intermediate); color: var(--bg); border-color: var(--intermediate); }
  .param-chip.channel { color: var(--channel); }
  .param-chip.channel:hover { background: var(--channel); color: var(--bg); border-color: var(--channel); }

  .deps-list { display: grid; gap: 8px; }
  .dep-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; transition: all 0.15s;
  }
  .dep-card:hover { background: var(--panel-2); border-color: var(--accent); transform: translateX(2px); }
  .dep-card .dep-name { font-family: "SF Mono", Monaco, monospace; color: var(--accent); font-weight: 500; }
  .dep-card .dep-label { color: var(--text-dim); font-size: 13px; margin-left: 10px; }
  .dep-card .dep-arrow { color: var(--text-dim); }

  .info-grid {
    display: grid; grid-template-columns: 140px 1fr; gap: 10px 20px;
    padding: 16px 18px; background: var(--panel); border-radius: 6px;
    border: 1px solid var(--border); font-size: 14px;
  }
  .info-grid dt { color: var(--text-dim); font-weight: 500; }
  .info-grid dd { color: var(--text); }

  .footnote { color: var(--text-dim); font-size: 13px; margin-top: 16px; padding: 10px 14px; background: var(--panel); border-radius: 4px; }

  .bike-svg {
    width: 100%; max-width: 760px; height: auto;
    background: var(--formula-bg);
    border: 1px solid var(--border); border-radius: 18px;
    display: block; margin-bottom: 6px;
  }
  .diagram-note { font-size: 12px; color: var(--text-dim); margin-top: 2px; padding-left: 4px; }

  /* ===== Live calculator additions ===== */
  .live-value {
    display: inline-block; padding: 4px 12px; border-radius: 6px;
    background: rgba(74, 222, 128, 0.12); border: 1px solid rgba(74, 222, 128, 0.4);
    color: var(--input); font-family: "SF Mono", Monaco, monospace;
    font-size: 16px; font-weight: 600;
  }
  .live-value.channel { background: rgba(255,140,90,0.12); border-color: rgba(255,140,90,0.4); color: var(--channel); }
  .live-value.intermediate { background: rgba(192,132,252,0.12); border-color: rgba(192,132,252,0.4); color: var(--intermediate); }

  .input-control {
    display: grid; grid-template-columns: 1fr 130px; gap: 16px; align-items: center;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 18px 20px;
  }
  .input-control input[type="range"] { width: 100%; accent-color: var(--accent); }
  .input-control input[type="number"] {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 10px; font-family: "SF Mono", Monaco, monospace;
    font-size: 14px; width: 100%;
  }
  .input-control .range-label { display: flex; justify-content: space-between; color: var(--text-dim); font-size: 11px; margin-top: 5px; }

  .dash-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
  }
  .dash-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 18px; cursor: pointer; transition: all 0.15s;
  }
  .dash-card:hover { border-color: var(--channel); transform: translateY(-2px); }
  .dash-card.intermediate:hover { border-color: var(--intermediate); }
  .dash-card .dash-label { color: var(--text-dim); font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
  .dash-card .dash-name { color: var(--text); font-size: 13px; font-family: "SF Mono", Monaco, monospace; margin-bottom: 10px; }
  .dash-card .dash-val { color: var(--channel); font-size: 22px; font-weight: 700; font-family: "SF Mono", Monaco, monospace; }
  .dash-card.intermediate .dash-val { color: var(--intermediate); }

  /* Formula cards on the dashboard */
  .formula-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 12px;
  }
  .formula-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px; transition: border-color 0.15s;
  }
  .formula-card.channel:hover      { border-color: var(--channel); }
  .formula-card.intermediate:hover { border-color: var(--intermediate); }
  .formula-card-head {
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
    margin-bottom: 10px; cursor: pointer;
  }
  .formula-card-head:hover { opacity: 0.85; }
  .formula-card-name { color: var(--text); font-family: "SF Mono", Monaco, monospace; font-weight: 700; font-size: 14px; }
  .formula-card.channel      .formula-card-name { color: var(--channel); }
  .formula-card.intermediate .formula-card-name { color: var(--intermediate); }
  .formula-card-label { color: var(--text-dim); font-size: 12px; }
  .formula-card-unit  { color: var(--text-dim); font-size: 11px; margin-left: auto; }
  .formula-card-body  { font-family: "SF Mono", Monaco, monospace; font-size: 13px; line-height: 1.7; color: var(--text); word-break: break-word; }
  .formula-line { display: block; margin: 2px 0; }
  .formula-line.formula-line-aux { color: var(--text-dim); font-size: 0.92em; padding-left: 12px; border-left: 2px solid var(--border); margin-top: 6px; }
  .formula-box .formula-line-aux { color: var(--text-dim); border-left-color: var(--border); }

  .preset-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
  .preset-btn {
    background: var(--panel); border: 1px solid var(--border); color: var(--accent);
    padding: 7px 14px; border-radius: 9999px; font-size: 12px; cursor: pointer;
    transition: all 0.15s; font-family: inherit;
  }
  .preset-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .preset-btn.reset { color: var(--text-dim); }
  .preset-btn.reset:hover { background: var(--panel); color: var(--text); border-color: var(--text-dim); }
  /* The system-wide press micro-interaction */
  .preset-btn:active, .lang-btn:active, .cat-btn:active, .chassis-btn:active,
  .dt-col-add:active, .linkage-mode-btn:active { transform: scale(0.96); }

  .nav-item.dashboard { background: rgba(0,102,204,0.06); border-color: rgba(0,102,204,0.25); margin-bottom: 14px; }
  .nav-item.dashboard.active { background: rgba(0,102,204,0.10); border-color: var(--accent); }

  .lang-bar {
    display: flex; gap: 6px; margin-bottom: 18px; padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .lang-btn {
    flex: 1; background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text-dim); padding: 7px 0; border-radius: 9999px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; font-family: inherit; letter-spacing: 0.5px;
  }
  .lang-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .lang-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  @media (max-width: 768px) {
    body { grid-template-columns: 1fr; --sidebar-w: 100%; }
    aside { position: static; height: auto; max-height: 240px; }
    main { padding: 20px 16px; }
    .input-control { grid-template-columns: 1fr; }
    .sidebar-toggle { display: none; }
  }

  /* Typography — SF Pro Display voice: weight 600, negative tracking */
  h1 {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "PingFang SC", sans-serif;
    font-weight: 600; letter-spacing: -0.02em; font-size: 30px;
  }
  .formula-box, .param-chip,
  .formula-card-name, .formula-card-body,
  .live-value, .dash-card .dash-name, .dash-card .dash-val,
  .dep-card .dep-name {
    font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace !important;
  }
  .section-title {
    letter-spacing: 0.1em;
  }
  /* Frosted parchment bar — the Apple sub-nav treatment */
  .breadcrumbs {
    padding: 8px 12px; background: color-mix(in srgb, var(--bg) 80%, transparent);
    border: 1px solid var(--divider); border-radius: 12px;
    backdrop-filter: saturate(180%) blur(20px);
  }
/* ==== Chassis Setup ==== */
.chassis-page { max-width: none; }
.chassis-desc { color: var(--text-dim, #94a3b8); font-size: 13px; margin: 6px 0 14px; }
.chassis-readout-strip { margin-bottom: 14px; }
.chassis-diagram-wrap { background: var(--formula-bg); border: 1px solid var(--border); border-radius: 18px; padding: 8px; margin-bottom: 14px; }
.chassis-diagram { width: 100%; height: auto; display: block; }
.chassis-actions { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
.chassis-library { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 9999px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
.chassis-btn { background: var(--accent); color: #fff; border: 1px solid var(--accent); border-radius: 9999px; padding: 6px 16px; font-size: 13px; cursor: pointer; }
.chassis-library:hover { border-color: var(--accent); }
.chassis-btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
.chassis-group { margin-bottom: 18px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
.chassis-group-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 10px; color: var(--text); }
.chassis-table-wrap { overflow-x: auto; max-width: 100%; }
.chassis-table { border-collapse: collapse; width: auto; font-size: 12px; background: var(--panel); color: var(--text); }
.chassis-table th, .chassis-table td { border: 1px solid var(--divider); padding: 2px 6px; line-height: 1.25; text-align: left; vertical-align: middle; white-space: nowrap; }
.chassis-table thead th { background: var(--panel); color: var(--text-dim); font-weight: 600; font-size: 11px; }
.chassis-table .chassis-input { width: 100%; min-width: 70px; box-sizing: border-box; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 1px 4px; font: inherit; font-size: 12px; }
.chassis-table .chassis-input:focus { outline: none; border-color: var(--accent); }
.chassis-input:focus { outline: none; border-color: var(--accent); }

/* Data Table */
/* The table scrolls inside its own viewport-height box, so the sticky
   thead (bike names) and sticky left column (parameter names) stay
   visible however long the row list grows. */
.dt-wrap { overflow: auto; max-width: 100%; max-height: calc(100vh - 30px); }
.dt-bike-head { position: relative; }
.dt-col-remove {
  position: absolute; top: 2px; right: 2px;
  background: transparent; color: var(--text-dim); border: 1px solid var(--border);
  border-radius: 9999px; cursor: pointer;
  width: 18px; height: 18px; line-height: 14px; font-size: 12px; padding: 0;
}
.dt-col-remove:hover { color: #b91c1c; border-color: #b91c1c; }
.dt-col-add {
  background: var(--panel); color: var(--accent);
  border: 1px solid var(--accent); border-radius: 9999px;
  padding: 4px 12px; font-size: 12px; cursor: pointer; white-space: nowrap;
}
.dt-col-add:hover { background: var(--accent); color: #fff; }
.dt-bike-add { vertical-align: middle; }
.dt-empty { display: flex; justify-content: center; padding: 32px 16px; }
.dt-empty-hint { color: var(--text-dim); font-size: 13px; text-align: center; padding-bottom: 16px; }
table.dt {
  border-collapse: collapse;
  width: 100%;
  font-size: 12px;
  background: var(--panel);
  color: var(--text);
}
/* Compact mode: squash vertical space so the whole table fits on one screen. */
table.dt.dt-compact th, table.dt.dt-compact td { padding: 2px 6px; line-height: 1.25; }
table.dt.dt-compact .dt-input,
table.dt.dt-compact .dt-bike-name,
table.dt.dt-compact .dt-readonly span { padding: 1px 4px; font-size: 12px; }
table.dt.dt-compact .dt-status { font-size: 8px; padding: 0 4px; margin-left: 4px; }
table.dt.dt-compact tr.dt-group th { padding: 3px 6px; font-size: 11px; letter-spacing: 0.4px; }
table.dt th, table.dt td {
  border: 1px solid var(--divider);
  padding: 6px 10px;
  text-align: left;
  vertical-align: top;
}
table.dt thead th {
  background: var(--panel);
  color: var(--accent);
  font-weight: 600;
  position: sticky; top: 0;
  z-index: 2; /* above the sticky-left body cells while rows scroll under */
}
table.dt th.dt-spec {
  position: sticky; left: 0;
  background: var(--panel);
  font-weight: 500;
  white-space: nowrap;
  z-index: 1;
}
table.dt thead th.dt-spec {
  z-index: 3;
}
table.dt tbody tr:nth-child(even) td,
table.dt tbody tr:nth-child(even) th {
  background: rgba(0,0,0,0.015);
}
table.dt tr.dt-group th {
  background: var(--panel);
  color: var(--accent);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 12px;
  border-top: 2px solid var(--accent);
  cursor: pointer;
  user-select: none;
}
table.dt tr.dt-group th:hover { background: rgba(0,102,204,0.06); }
.dt-caret { display: inline-block; width: 14px; color: var(--text-dim); }
.dt-group-count { color: var(--text-dim); font-weight: 500; text-transform: none; }
table.dt td.dt-current,
table.dt th.dt-current {
  border-left: 2px solid var(--accent);
  font-weight: 500;
}
table.dt .dt-preset {
  color: var(--text-dim);
  font-size: 11px;

/* ==== Help FAB + User Guide ==== */
.help-fab {

  border-radius: 50%;

  color: var(--text-dim);
  border: 1px solid var(--border);
  font-size: 18px; font-weight: 600;

  display: flex; align-items: center; justify-content: center;

}
.help-fab:hover { color: var(--accent); border-color: var(--accent); transform: scale(1.08); }
.toast {
  position: fixed; left: 50%; bottom: 24px; transform: translate(-50%, 20px);
  max-width: min(90vw, 460px); padding: 10px 18px;
  background: var(--text); color: var(--bg);
  border-radius: 10px; font-size: 13px; font-weight: 500;
  box-shadow: 0 6px 24px rgba(0,0,0,0.18);

.toast.toast-warn { background: #b45309; color: #fff; }
.guide-page { max-width: 820px; line-height: 1.65; }
.guide-page .guide-header h1 { font-size: 28px; margin-bottom: 8px; }
.guide-page .guide-intro { color: var(--text-dim); margin-bottom: 24px; }
.guide-page .guide-toc {
  background: var(--panel-2); border: 1px solid var(--border);
  padding: 14px 20px; border-radius: 8px; margin-bottom: 28px;
}
.guide-page .guide-toc h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 8px; }
.guide-page .guide-toc ol { margin: 0; padding-left: 20px; }
.guide-page .guide-toc a { color: var(--accent); text-decoration: none; }
.guide-page .guide-toc a:hover { text-decoration: underline; }
.guide-page .guide-section { padding: 18px 0; border-top: 1px solid var(--border); scroll-margin-top: 60px; }
.guide-page .guide-section.focused { animation: guide-flash 1.4s ease-out; }
@keyframes guide-flash {
  0%   { background: rgba(0, 102, 204, 0.10); }
  100% { background: transparent; }
}
.guide-page h2 { font-size: 20px; margin-bottom: 10px; }
.guide-page h4 { font-size: 14px; margin-top: 14px; margin-bottom: 6px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.4px; }
.guide-page p, .guide-page ul, .guide-page ol { margin-bottom: 10px; }
.guide-page ul, .guide-page ol { padding-left: 22px; }
.guide-page li { margin-bottom: 4px; }
.guide-page code { background: var(--panel-2); border: 1px solid var(--border); padding: 1px 5px; border-radius: 3px; font-size: 12px; }

.cat-wrap { max-width: 100%; }
.cat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 12px; flex-wrap: wrap; }

.cat-help { color: var(--text-dim); font-size: 12px; margin-bottom: 12px; }

.cat-tab {

.cat-tab:hover { color: var(--text); }
.cat-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.cat-input {

.cat-btn-danger { color: #b91c1c; border-color: rgba(185,28,28,0.35); padding: 2px 10px; }

.cat-btn-warn { color: #b45309; border-color: rgba(180,83,9,0.35); }

/* Linkage Setup page */
.linkage-page .header { margin-bottom: 6px; }
.linkage-readout-strip {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 10px; margin-bottom: 8px;
}
.linkage-readout {
  background: var(--panel); border: 1px solid var(--border);

}

.linkage-guide {

}

.linkage-guide ul { margin: 10px 0 4px 18px; color: var(--text-dim); font-size: 13px; line-height: 1.6; }

.linkage-mode-title { font-size: 12px; color: var(--text-dim); letter-spacing: 0.5px; margin-bottom: 6px; }
.linkage-mode-row { display: flex; gap: 8px; flex-wrap: wrap; }

.linkage-points-desc {

}
.linkage-length-row label {
  display: grid; grid-template-columns: 1fr auto;
  grid-template-areas: "name unit" "input input";
  column-gap: 6px; row-gap: 4px; align-items: center;

}
.linkage-length-row label > span:first-child { grid-area: name; }
.linkage-length-row label > .linkage-unit    { grid-area: unit; justify-self: end; }
.linkage-length-row input[type="number"] {

  background: var(--panel); border: 1px solid var(--border); color: var(--text);
  border-radius: 6px; padding: 4px 8px; font-size: 14px; width: 100%; min-width: 0;
  font-family: ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace;

}

// ============================================================

const P_EN = {
  Trail_Static: { label:'Static Trail', desc:'Horizontal distance from the front contact patch to where the steering axis meets the ground. Static baseline — sets straight-line stability and steering feel.', note:'Convert Rake to radians first. Larger Rake or smaller Offset both grow Trail, increasing stability at the cost of nimbleness.' },
  MotoSPEC_Rake: { label:'Dynamic Rake', desc:'The instantaneous steering-axis rake angle while the bike is moving. When the fork compresses and the rear extends, the front drops and Rake decreases.', note:'arctan returns Pitch in radians; multiply by 180/π to convert to degrees before subtracting.' },
  MotoSPEC_Trail:{ label:'Dynamic Trail', desc:'Distance from the front contact patch to where the steering axis meets the ground. Trail collapses sharply when Rake decreases — this is the core source of front-end "feel".', note:'Use the dynamic Rake (in radians). Under heavy braking, Trail bottoming out causes vague front-end feedback.' },
  Swingarm_Angle:{ label:'Swingarm Angle', desc:'Angle between the swingarm and horizontal at the current shock state. Compression makes the angle smaller (more horizontal).', note:'On corner exit, an almost-horizontal swingarm collapses mechanical grip and the bike pushes wide.' },
  Anti_Squat:{ label:'Anti-Squat %', desc:'Geometric resistance to rear squat under acceleration. 100% = rear ride height stays; >100% = rear lifts; <100% = rear squats.', note:'The soul metric of corner-exit setup. 120% plants the rear; 140% over-extends the shock and invites high-sides.' },
  MotoSPEC_FrontForce:{ label:'Front Vertical Load', desc:'Normal force on the front contact patch. Rises under braking, falls under acceleration. Sets the front grip ceiling.', note:'If FrontForce spikes too fast on entry, the front overloads and locks.' },
  MotoSPEC_RearForce:{ label:'Rear Vertical Load', desc:'Normal force on the rear contact patch. Rises under acceleration, falls under braking.', note:'A sudden drop in RearForce at the exit point means the rear is about to spin up.' },
  Pitch:{ label:'Chassis Pitch', desc:'Pitch angle of the chassis relative to horizontal. Positive when the front sinks more than the rear (brake nose-dive).' },
  delta_beta:{ label:'Swingarm Angle Δ', desc:'Change in swingarm angle (radians) caused by rear vertical travel.' },
  theta_thrust:{ label:'Thrust Angle', desc:'Resultant direction of chain pull combined with the swingarm line. tan(thrust) = tan(chain) + tan(swingarm).', note:'Standard tangent method: sum the tangents first, then take arctan.' },
  theta_cg:{ label:'CG Angle', desc:'Elevation angle from the rear contact patch up to the center of gravity.' },
  delta_W:{ label:'Longitudinal Load Transfer', desc:'Front/rear weight shift caused by longitudinal acceleration. Positive on braking (forward shift), negative on acceleration.', note:'Here a_x is in g (dimensionless). If using m/s², drop the ×9.81.' },
  F_Aero:{ label:'Aero Downforce', desc:'Total aerodynamic downforce produced at speed by bodywork and winglets.' },
  W_F_Static:{ label:'Front Static Load', desc:'Normal force on the front wheel when the bike is stationary.' },
  W_R_Static:{ label:'Rear Static Load', desc:'Normal force on the rear wheel when the bike is stationary.' },

  Rake_Static: { label:'Static Rake', desc:'Steering-axis angle from vertical when the bike is at rest.', source:'Frame geometry sheet or direct measurement', typical:'23° – 27° (sport), 27° – 32° (touring)' },
  Travel_Front: { label:'Front Wheel Travel', desc:'Current front-fork compression. Compression is positive.', source:'Fork potentiometer (live)', typical:'0 – 120 mm (model-dependent)' },
  Travel_Rear:  { label:'Rear Wheel Travel', desc:'Current rear vertical compression. Compression is positive. Multiply shock travel by Motion Ratio.', source:'Shock potentiometer × Motion Ratio', typical:'0 – 130 mm' },
  WB:           { label:'Wheelbase', desc:'Horizontal distance between front and rear axle centers.', source:'Frame manual', typical:'1340 – 1440 mm (sport)' },
  Rf:           { label:'Front Rolling Radius', desc:'Loaded rolling radius of the front tire (with deformation correction).', source:'Tire spec + deformation factor', typical:'300 – 320 mm (17")' },
  O:            { label:'Total Offset', desc:'Perpendicular offset of the front axle from the steering axis. Derived from Yoke Offset.', source:'Derived from yoke offset', typical:'25 – 35 mm' },
  beta_static:  { label:'Static Swingarm Angle', desc:'Angle between the line from swingarm pivot to rear axle and horizontal at rest.', source:'Frame manual or direct measurement', typical:'10° – 18°' },
  L_SA:         { label:'Effective Swingarm Length', desc:'Distance from the swingarm pivot to the rear axle.', source:'Frame manual', typical:'550 – 600 mm' },
  H_CG:         { label:'CG Height', desc:'Vertical height of the combined rider+bike center of gravity above ground.', source:'Scale + tilt-table method', typical:'600 – 700 mm (with rider)' },
  L_CG:         { label:'CG to Rear Axle (Horiz.)', desc:'Horizontal distance from the combined CG to the rear axle.', source:'Scales + geometric conversion', typical:'700 – 800 mm' },
  Mass:         { label:'Total Mass', desc:'Bike + rider + gear total mass.', source:'Scale', typical:'250 – 280 kg' },
  a_x:          { label:'Longitudinal Acceleration', desc:'Longitudinal acceleration. Convention: braking positive, accelerating negative — convenient for forward load transfer.', source:'IMU or GPS', typical:'−0.5 g (accel) to +1.4 g (hard brake)' },
  rho:          { label:'Air Density', desc:'Ambient air density (depends on temperature and altitude).', source:'Weather data or ISA standard', typical:'≈ 1.225 kg/m³ (sea level, 15 °C)' },
  V:            { label:'Speed', desc:'Bike speed relative to ground.', source:'GPS or wheel-speed sensor', typical:'0 – 90 m/s (≈ 0 – 320 km/h)' },
  Cd:           { label:'Drag Coefficient', desc:'Combined bike+rider drag coefficient (dimensionless).', source:'Wind tunnel or manufacturer spec', typical:'0.30 – 0.50' },
  A:            { label:'Frontal Area', desc:'Bike+rider projected area facing the airflow.', source:'Measurement or CAD', typical:'0.4 – 0.6 m²' },
  C_f_aero:     { label:'Front Aero Distribution', desc:'Fraction of aero downforce going to the front wheel.', source:'Wind tunnel or race-engineering experience', typical:'0.3 – 0.5' },
  C_r_aero:     { label:'Rear Aero Distribution', desc:'Fraction of aero downforce going to the rear wheel.', source:'Wind tunnel or race-engineering experience', typical:'0.5 – 0.7' },
  front_weight_dist:{ label:'Front Static Weight Dist.', desc:'Fraction of total weight on the front wheel at rest.', source:'Scale', typical:'0.50 – 0.55 (sport)' },
  rear_weight_dist: { label:'Rear Static Weight Dist.',  desc:'Fraction of total weight on the rear wheel at rest. = 1 − front_weight_dist.', source:'Scale', typical:'0.45 – 0.50' },

  // ----- Channels / intermediates -----
  Normal_Trail:{ label:'Normal Trail', desc:'Shortest distance from the front contact patch to the steering axis (measured perpendicular to the axis). Equals Ground_Trail × cos(Rake).', note:'Normal Trail is the true length of the steering moment arm; Ground Trail = Normal_Trail / cos(Rake).' },
  theta_chain_dynamic:{ label:'Dynamic Chain Pull Angle', desc:'Angle of the upper tangent line from the top of the front sprocket to the top of the rear sprocket, relative to horizontal. Positive means the chain rises toward the front (generating anti-squat). The front sprocket is fixed to the frame; the rear sprocket center swings with the swingarm by Swingarm_Length × Swingarm_Angle.', note:'Chain pitch 15.875 mm applies to 520/525/530 chains. Rear sprocket center: (−L·cos(β), −L·sin(β)), where β is Swingarm_Angle in degrees.' },
  Final_Ratio:{ label:'Final Drive Ratio', desc:'Rear-sprocket / front-sprocket tooth ratio.' },
  delta_fork:{ label:'Fork Geometry Delta', desc:'Difference of the current fork setup versus the reference setup (the state when Rake was measured), along the fork axis. Raising the tubes (larger Fork_Position) or fitting a shorter fork (Fork_Length_Delta < 0) lowers the front, with exactly the same effect as front sag.', note:'Positive = front lowered relative to the reference attitude. Default state (protrusion = reference, same fork) → delta is 0, physically honest.' },
  delta_beta_sag:{ label:'Rear-Sag Swingarm Rotation', desc:'Swingarm rotation (radians) caused by the rear wheel rising by Sag_Rear relative to the frame. Compression rotates the swingarm toward horizontal → β decreases, so it is negative.' },
  Pitch_Sag:{ label:'Load Pitch Angle', desc:'Chassis pitch of the current load state relative to the reference attitude, nose-down positive. Front drop = (front sag + fork delta) projected onto the vertical (×cos Rake) − front tire radius delta; rear drop = rear sag − rear lift (shock delta turned into swingarm rotation + chain-adjuster change in axle depth, both relative to the reference swingarm length) − rear tire radius delta. Tire deltas are purely vertical and are not projected.', note:'cos(Rake) projects travel along the fork axis onto the vertical — equal front and rear sag values do not leave attitude unchanged (the front actually drops slightly less). A longer shock (RHA / ΔShock > 0) or a rearward chain-adjuster move (axle deeper below the pivot) → rear raised → nose-down positive → Rake decreases.' },
  swingarm_delta_solve:{ formula:[["Δβ = δ*  s.t.  shock(δ*) = L_target"],["L_target = shock(δ=0) + ",{ref:'Shock_Clevis_RHA'}," + ( ",{ref:'Shock_Length'}," − ",{ref:'Shock_Length_ref'}," )"],["outer: bisection search δ ∈ [−45°, +45°], evaluating shock(δ_mid) each step"],["shock(δ) = | rocker_shock_end(δ) − ",{ref:'Frame_Shock_Top_X'},",",{ref:'Frame_Shock_Top_Y'}," |"],["rocker_shock_end(δ) = ",{ref:'Frame_Rocker_Pivot_X'},",",{ref:'Frame_Rocker_Pivot_Y'}," + R(Δφ)·(",{ref:'Rocker_To_Shock_X'},",",{ref:'Rocker_To_Shock_Y'},")"],["inner: Newton-Raphson solving Δφ  s.t.  | rocker_drag_end(Δφ) − swingarm_drag_end(δ) | = L_drag_static"],["rocker_drag_end(Δφ) = R(Δφ) rotate ",{ref:'Rocker_To_Drag_X'},",",{ref:'Rocker_To_Drag_Y'}," about frame_rocker_pivot"],["swingarm_drag_end(δ) = R(δ) rotate ",{ref:'Drag_To_Swingarm_X'},",",{ref:'Drag_To_Swingarm_Y'}," about origin"],["Pro-Link mode: β negated, Frame_Shock_Top rotated once into the swingarm frame"]], label:'4-bar back-solve (shock delta → static swingarm-angle change)', desc:'Given the total shock delta (clevis adjustment + length difference of the current shock vs the reference shock), back-solve the swingarm rotation Δβ_static from the original static position. Two nested numerical root-finds: an outer bisection search over δ, an inner Newton-Raphson solving the 4-bar drag-link closure. Shared by Swingarm_Angle / Rear_Ride_Height / Pitch_Sag. Travel_Rear is treated as 0 (static stage).', note:'Total shock delta > 0 (longer) → the swingarm is pushed down → static δ is positive. RHA is essentially a shock-length difference, so ΔShock stacks linearly with it into the same constraint. For the dynamic stage (including Travel_Rear), split out a separate swingarm_delta_dynamic.' },
  Motion_Ratio:{ formula:[["|d ",{ref:'Swingarm_Length'},"·sin(",{ref:'beta_static'},"+δ) / dδ|  ÷  |d shock(δ; 4-bar) / dδ|"],["where: δ = ",{ref:'swingarm_delta_solve'}," + ",{ref:'delta_beta_sag'}," × (180/π)  (differentiated at the current load point)"]], label:'Motion Ratio (wheel/shock)', desc:'Instantaneous ratio of rear-wheel vertical displacement to shock travel, found by numerical differentiation of the 4-bar linkage closure at the current load point δ_load. Wheel height y_w = Swingarm_Length·sin(beta_static + δ); shock length shock(δ) is solved by closeFourBar as the distance from the rocker→shock endpoint to Frame_Shock_Top at each swingarm angle.', note:'Central-difference implementation: MR(0) ≈ (y_w(+ε) − y_w(−ε)) / (shock(+ε) − shock(−ε)), ε=0.5°. Pro-Link mode uses the same solver with β negated, working in the swingarm reference frame.' },
  Progression:{ formula:[["(MR_max − MR_min) / MR_min × 100"],["where: δ ∈ [0°, δ_full], δ_full = 4-bar back-solve( shock compression = ",{ref:'Shock_Stroke'}," )"],["(bump direction: compression = rear wheel rises = β decreases)"]], label:'Progression (% of full shock travel)', desc:'Range of motion-ratio variation over the full shock travel of the suspension, as a percentage of its minimum. The full-travel angle comes from back-solving a shock compression of Shock_Stroke, then Motion_Ratio is sampled point-by-point along the bump direction — matching the real MotoSPEC Full Shock Travel definition.', note:'Positive (typically 5–25%) = progressive linkage (stiffens as it compresses); near 0% = nearly linear; negative = digressive linkage (softens as it compresses).' },
  Rear_Ride_Height:{ formula:[["− ",{ref:'Swingarm_Length'}," × sin(",{ref:'beta_static'}," + ",{ref:'swingarm_delta_solve'}," + ",{ref:'delta_beta_sag'}," × (180/π))"],["static simplification (Sag_Rear=0, RHA=0, ΔShock=0):  − ",{ref:'Swingarm_Length'}," × sin(",{ref:'beta_static'},")"]], label:'Rear Ride-Height Reference', desc:'Signed vertical coordinate of the rear axle relative to the swingarm pivot at the current load state (negative when the wheel is below the pivot). The shock delta lifts the swingarm off horizontal and rear sag rotates it back toward horizontal — both enter the evaluation angle.', note:'A longer shock (RHA / ΔShock > 0) → the swingarm rotates further off horizontal → this value becomes more negative, i.e. the rear actually rises; rear-sag compression is the reverse. Open swingarm_delta_solve for the full Δβ back-solve algorithm.' },
  Rear_Wheel_Vertical_Travel:{ formula:[["| ",{ref:'Swingarm_Length'},"·sin(",{ref:'beta_static'}," + ",{ref:'swingarm_delta_solve'},")  −  ",{ref:'Swingarm_Length'},"·sin(",{ref:'beta_static'}," + Δβ_static) |"],["where: Δβ_static = 4-bar back-solve(",{ref:'Shock_Clevis_RHA'},", Travel_Rear=0)  (static swingarm angle after RHA adjustment)"],["local linear approximation:  ",{ref:'Travel_Rear'}," × ",{ref:'Motion_Ratio'}]], label:'Rear Wheel Vertical Travel', desc:'Magnitude of the vertical wheel displacement at the current shock position relative to the RHA-adjusted static reference point (always non-negative). Approximately shock travel × Motion_Ratio (valid within the locally linear region of MR).', note:'Always 0 when Travel_Rear=0. Under a nonlinear progressive linkage, wheel travel / shock travel does not equal the static Motion_Ratio. Open swingarm_delta_solve for the full Δβ back-solve algorithm.' },
  Rear_Wheel_Rate:{ label:'Rear Wheel Rate', desc:'Combined rear wheel rate at the static sag point. Motion_Ratio = wheel travel / shock travel (≈2–3). Energy identity: Rear_Wheel_Rate = Rear_Spring_Rate / Motion_Ratio².' },
  Front_Wheel_Rate:{ label:'Front Wheel Rate', desc:'Combined front wheel rate (at the wheel), both fork legs summed. MR_front = 1 / cos(Rake_Static) ≈ 1.05–1.10 is the fork compression per unit of front-wheel vertical travel; the fork strokes more than the wheel rises, so the wheel rate exceeds the spring rate: Front_Wheel_Rate = 2 × Front_Spring_Rate × MR_front² = 2 × Front_Spring_Rate ÷ cos²(Rake_Static). Front_Spring_Rate is the per-leg spring rate (spec-sheet convention); the fork is treated as two springs.' },
  Sag_Front_Predicted:{ formula:[["F_axial = ",{ref:'W_F_Static'}," × cos(",{ref:'Rake_Static'},")"],["top-out region (x ≤ top-out length):  x = (F_axial + 2·",{ref:'Front_Topout_Rate'},"·",{ref:'Front_Topout_Length'}," − 2·",{ref:'Front_Spring_Rate'},"·",{ref:'Front_Spring_Preload'},") / (2·k + 2·k_t)"],["beyond that:  x = F_axial / (2·",{ref:'Front_Spring_Rate'},") − ",{ref:'Front_Spring_Preload'}]], label:'Predicted Front Sag', desc:'Static fork sag predicted from spring data (along the fork axis, zip-tie convention): the front static-load component along the steering axis balances the two main leg springs + the top-out spring. Coil springs only — the air spring (oil level / air gap) and friction are not modeled, so the gap between measured and predicted sag is their contribution (a spring-diagnostic use).', note:'Predicted noticeably larger than measured → actual effective rate is higher than the nameplate (air spring / more preload); noticeably smaller → soft springs or less preload than set.' },
  Sag_Rear_Predicted:{ formula:[["solve s:  k·(preload + s) − k_t·max(0, top-out length − s) = ",{ref:'W_R_Static'}," × MR(δ(s))"],["δ(s) = 4-bar back-solve (shock compression s, incl. RHA/ΔShock)"],["predicted sag = vertical wheel displacement(δ(s))"]], label:'Predicted Rear Sag', desc:'Static rear vertical sag predicted from spring data: iteratively solve for the shock travel s at which the spring force (main + top-out) equals the rear static load × the motion ratio at that position, then convert to vertical wheel displacement through the 4-bar linkage.', note:'A balance point beyond Shock_Stroke (bottom-out) → NaN. Comparing against the measured LOAD CASE value is the spring-rate diagnostic.' },
  Wheelbase_Live:{ label:'Wheelbase (current load)', desc:'Horizontal front-to-rear axle distance at the current load/setup state. WB is a one-time reference measurement, never hand-edited afterward: front sag / fork delta pull the front axle along the steering axis; rear sag / shock delta / chain-adjuster move change the rear-axle horizontal projection; a yoke-offset swap shifts the front axle horizontally. All are deltas, so at the reference state this equals WB exactly.', note:'Oracle validation (Triumph 765, three columns differing only in yoke offset): +1.5 mm offset → wheelbase +1.4; +3 mm → +2.7 = 3 × cos(23.7°). Shock-length response matches the Panigale screenshot 323.5→317 giving 1449.9→1446.7.' },

  // ----- Inputs -----
  Yoke_Offset:{ label:'Yoke Offset', desc:'Triple-clamp (yoke) offset.', source:'Triple-clamp spec', typical:'25 – 40 mm' },
  Fork_Length:{ label:'Fork Length (static)', desc:'Effective installed fork length from the top yoke to the front axle center (static, excluding front-wheel compression). Not yet consumed by any formula — no absolute fork length is known; ride-height change from a fork swap goes through Fork_Length_Delta (a length difference that can actually be measured).', source:'Fork spec / measurement', typical:'720 – 820 mm (sport)' },
  Fork_Position:{ label:'Fork Protrusion', desc:'Length of fork tube protruding above the top yoke. Its difference from Fork_Position_ref changes ride height (raising the tubes lowers the front).', source:'Measurement', typical:'0 – 15 mm' },
  Fork_Position_ref:{ label:'Reference Fork Protrusion', desc:'Fork protrusion at the moment Rake_Static was measured. The current Fork_Position minus this value is one input to the attitude-correction chain.', source:'Recorded when Rake was measured', typical:'0 – 15 mm' },
  Fork_Length_Delta:{ label:'Fork Length Delta (vs reference)', desc:'Total-length difference of the current fork versus the fork fitted when Rake_Static was measured (positive = longer = front raised). 0 = same fork, the physically honest default. Just measure the difference by butting the two forks together — no absolute length needed.', source:'Measured difference, forks side by side', typical:'−15 – +15 mm' },
  Tire_Rf_Delta:{ label:'Front Tire Radius Delta (vs baseline)', desc:'Loaded rolling-radius difference of the current front tire versus the baseline tire (the one fitted when Rake / WB / Trail were measured); positive = taller = front raised → Rake opens. 0 = same tire, the physically honest default. Feeds both the attitude-pitch chain and the effective radius in the trail formulas (Rf + Δ).', source:'Measured difference in loaded axle height', typical:'−10 – +10 mm' },
  Tire_Rr_Delta:{ label:'Rear Tire Radius Delta (vs baseline)', desc:'Loaded rolling-radius difference of the current rear tire versus the baseline tire; positive = taller = rear raised → Rake closes. 0 = same tire. Feeds only the attitude-pitch chain (rear-axle vertical position); does not change swingarm/linkage geometry.', source:'Measured difference in loaded axle height', typical:'−10 – +10 mm' },
  Shock_Stroke:{ label:'Shock Stroke', desc:'Maximum compression stroke of the shock shaft (full extension to bottom-out). Defines the "full shock travel" sweep range for Progression — matching the real MotoSPEC Full Shock Travel.', source:'Shock spec sheet', typical:'55 – 65 mm' },
  Swingarm_Length_ref:{ label:'Reference Swingarm Length', desc:'Swingarm pivot → rear axle distance when WB / Rake_Static were measured. A chain-adjuster move changes only Swingarm_Length; the resulting wheelbase and attitude change are computed from the delta — WB is never hand-edited.', source:'Recorded when WB was measured', typical:'520 – 600 mm' },
  Yoke_Offset_ref:{ label:'Reference Yoke Offset', desc:'Yoke offset when WB / Rake_Static were measured. After an offset swap only Yoke_Offset changes; the wheelbase change (Δo × cos Rake) flows automatically into Wheelbase_Live.', source:'Recorded when WB was measured', typical:'25 – 40 mm' },
  Shock_Length_ref:{ label:'Reference Shock Length', desc:'Eye-to-eye length of the shock fitted when Rake_Static / beta_static were measured. The current Shock_Length minus this value enters the 4-bar back-solve exactly like Shock_Clevis_RHA (RHA is essentially just a shock-length difference).', source:'Recorded when Rake was measured', typical:'290 – 320 mm' },
  Front_Spring_Rate:{ label:'Front Spring Rate', desc:'Front fork main-spring rate.', source:'Spring spec', typical:'8.0 – 10.0 N/mm' },
  Front_Spring_Preload:{ label:'Front Spring Preload', desc:'Front fork spring preload.', source:'Setup setting', typical:'5 – 15 mm' },

  Swingarm_Length:{ label:'Swingarm Length', desc:'Distance from the swingarm pivot to the rear axle center.', source:'Frame manual', typical:'520 – 600 mm' },
  Shock_Clevis_RHA:{ label:'Shock Clevis (RHA)', desc:'Rear ride-height adjustment at the shock clevis.', source:'Setup setting', typical:'-5 – 5 mm' },

// === Trail (static) ===
DIAGRAMS.Trail_Static = () => {
  const b = BIKE, sh = b.steeringHead, fa = b.frontAxle;
  const dx = fa.x - sh.x, dy = fa.y - sh.y, len = Math.hypot(dx, dy);
  const ux = dx/len, uy = dy/len;
  const t = (b.groundY - sh.y) / uy;
  const gx = sh.x + ux * t;
  return `
    <line x1="${sh.x}" y1="${sh.y}" x2="${gx.toFixed(1)}" y2="${b.groundY}" stroke="${SC.hi}" stroke-width="2" stroke-dasharray="6,4" opacity="0.8"/>

function setBikeInput(bikeIdx, key, raw) {
  const b = state.bikes[bikeIdx];
  if (!b) return;
  const n = parseFloat(raw);
  if (isNaN(n)) {
    // Clearing the cell removes the override — the input returns to the
    // honest unbound state (dependent RESULTS blank again).
    if (String(raw).trim() === '' && b.overrides && key in b.overrides) {
      delete b.overrides[key];
      saveState();
      patchDataTableView();
    }
    return;
  }
  // No mid-typing clamp: INPUT_META min/max stay on the element as browser
  // hints, but silently rewriting a typed value (e.g. "9" on the way to
  // "95" clamped up to the range floor) falsifies user data.
  if (!b.overrides) b.overrides = {};
  // Track that the user explicitly set this field — drives the
  // "blank until inputs are real" logic in the data table. Chassis-domain
  // fields are read-only echoes of the chassis profile (their linked-pair
  // mirroring lives solely in chassis-setup.js), EXCEPT the three
  // SETUP_OVERRIDABLE keys (yoke offset / fork position / swingarm
  // length), which render as inputs when a chassis is selected and land
  // here as per-column overrides layered on the profile.
  b.overrides[key] = n;
  b.values[key] = n;
  saveState();
  patchDataTableView();
}
// Recompute the data table but touch ONLY read-only cells (computed
// results, chassis echoes, missing-input hints) — the <input> the user is
// typing into is never replaced, so focus and caret survive. Structure
// (row/cell count) only changes via component selection or add/remove
// bike, which go through full renderContent().
function patchDataTableView() {
  if (stack[stack.length - 1] !== '__datatable') return;
  const live = document.querySelector('#content .dt-wrap table');
  if (!live) { renderContent(); return; }
  const tmp = document.createElement('div');
  // `lang` lives outside `state` — pass it explicitly or the patch render
  // silently falls back to zh and rewrites read-only cells in the wrong
  // language while typing in EN mode.
  tmp.innerHTML = renderDataTable({ values: state.values, bikes: state.bikes, dtCollapsed: state.dtCollapsed, lang });
  const fresh = tmp.querySelector('table');
  const liveCells = live.querySelectorAll('td.dt-readonly');
  const freshCells = fresh ? fresh.querySelectorAll('td.dt-readonly') : [];
  if (!fresh || liveCells.length !== freshCells.length) { renderContent(); return; }
  liveCells.forEach((td, i) => {
    const next = freshCells[i];
    if (td.outerHTML !== next.outerHTML) {
      td.className = next.className;
      td.title = next.getAttribute('title') || '';
      td.innerHTML = next.innerHTML;
    }
  });
}

const REMOTE_CACHE_KEY = 'motospec_shared_catalogs_v1';
const AUTHOR_KEY = 'motospec_author_v1';
function getAuthor() { try { return localStorage.getItem(AUTHOR_KEY) || null; } catch (e) { return null; } }

function toast(msg, kind) {

function rerenderCatalogSurfaces() {

// Load the shared library: hydrate instantly from cache, then refresh live.
async function initSharedCatalogs() {
  try {
    const cached = localStorage.getItem(REMOTE_CACHE_KEY);
    if (cached) { applyRemoteCatalogs(JSON.parse(cached)); rerenderCatalogSurfaces(); }
  } catch (e) {}
  try {
    const remote = await fetchSharedCatalogs();
    applyRemoteCatalogs(remote);
    cacheRemote();

// Push one entry to the shared library; on success serve it from the remote
// layer and drop the optimistic local copy. Returns true on success.
async function pushEntryToShared(catalogKey, id, entry) {
  try {
    const stored = await upsertSharedEntry(catalogKey, id, entry, getAuthor());
    setRemoteEntry(catalogKey, id, stored);
    clearLocalOverlayEntry(catalogKey, id);
    cacheRemote();
    return true;
  } catch (e) {
    console.error(e);
    toast(lang === 'en' ? 'Saved locally — shared sync failed (offline?)' : '已本地保存 — 共享同步失败（离线？）', 'warn');
    return false;
  }
}

async function removeCatalogEntryUI(catalogKey, id) {

    : '从共享库删除 ' + catalogKey + '/' + id + '？\n（软删除，可从历史恢复。）'));

function exportCatalogs() {
  // Back up the full effective library (everything currently visible).
  const snapshot = Object.fromEntries(CATALOG_KEYS.map(k => [k, CATALOGS[k] || {}]));
  const json = JSON.stringify(snapshot, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'motospec-catalogs.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function importCatalogs() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'application/json,.json';
  input.onchange = async () => {
    const f = input.files?.[0]; if (!f) return;
    const ok = confirm(lang === 'en'
      ? 'Publish the entries in this file to the shared library (visible to everyone)?'
      : '把该文件里的条目发布到共享库（所有人可见）？');
    if (!ok) return;
    try {
      const parsed = JSON.parse(await f.text());
      const n = await bulkUpsertShared(parsed, getAuthor());
      const remote = await fetchSharedCatalogs();
      applyRemoteCatalogs(remote); cacheRemote(); renderContent();
      toast((lang === 'en' ? 'Published ' : '已发布 ') + n + (lang === 'en' ? ' entries to the shared library' : ' 条到共享库'));
    } catch (e) { alert((lang === 'en' ? 'Import failed: ' : '导入失败：') + e.message); }

}
function resetCatalogs() {

    ? 'Clear your local (unsynced) catalog edits? The shared library is not affected.'

// One-time migration: publish this browser's local overlay to the shared library.
async function publishLocalToShared() {
  const overlay = getUserOverlay();
  const count = CATALOG_KEYS.reduce((s, k) => s + Object.values(overlay[k] || {}).filter(e => e && !e.__deleted).length, 0);
  if (!count) { toast(lang === 'en' ? 'No local entries to publish' : '没有本地条目可发布'); return; }
  const ok = confirm(lang === 'en'
    ? `Publish your ${count} local component(s) to the shared library so everyone can see them?`
    : `把你本地的 ${count} 个部件发布到共享库，让所有人都能看到？`);
  if (!ok) return;
  try {
    const n = await bulkUpsertShared(overlay, getAuthor());
    resetUserOverlay();                 // local now redundant with shared
    const remote = await fetchSharedCatalogs();
    applyRemoteCatalogs(remote); cacheRemote();
    saveState(); renderContent();
    toast((lang === 'en' ? 'Published ' : '已发布 ') + n + (lang === 'en' ? ' to the shared library' : ' 个到共享库'));
  } catch (e) {
    console.error(e);
    toast(lang === 'en' ? 'Publish failed (offline?)' : '发布失败（离线？）', 'warn');
  }
}

// ============================================================
// 状态：当前路径（面包屑）
// ============================================================
let stack = ['__dashboard'];

function typeLabel(t) {
  return ({channel: T('type_channel'), intermediate: T('type_intermediate'), input: T('type_input')})[t] || t;
}

function navigateTo(id) {
  if (id !== '__dashboard' && id !== '__datatable' && id !== '__chassis' && id !== '__linkage' && id !== '__catalogs' && id !== '__guide' && !P[id]) return;
  if (stack[stack.length - 1] === id) return;
  const idx = stack.indexOf(id);
  if (idx >= 0) stack = stack.slice(0, idx + 1);
  else stack.push(id);
  render();
}

function navigateRoot(id) {
  if (id !== '__dashboard' && id !== '__datatable' && id !== '__chassis' && id !== '__linkage' && id !== '__catalogs' && id !== '__guide' && !P[id]) return;
  stack = [id];
  render();
}

function render() {
  clearCache();
  applyUIChrome();
  renderNav();
  renderBreadcrumbs();
  renderContent();
}

function applyUIChrome() {
  document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
  document.querySelectorAll('[data-ui]').forEach(el => {
    el.textContent = T(el.getAttribute('data-ui'));
  });
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-lang') === lang);
  });
  const fab = document.getElementById('help-fab');
  if (fab) {
    fab.title = T('help_tooltip');
    // Hide the floating ? on the guide page itself.
    fab.style.display = stack[stack.length - 1] === '__guide' ? 'none' : '';
  }
}

// Map a page sentinel to its user-guide anchor. Drill-down parameter
// pages fall through to the dashboard section.
const PAGE_TO_GUIDE_ANCHOR = {
  __dashboard: 'dashboard',
  __chassis:   'chassis',
  __linkage:   'linkage',
  __datatable: 'datatable',
  __catalogs:  'catalogs',
};
function openGuide(anchor) {
  state.guideAnchor = (GUIDE_ANCHORS.includes(anchor) ? anchor : 'getting-started');
  navigateRoot('__guide');
}
function openGuideForCurrentPage() {
  const cur = stack[stack.length - 1];
  openGuide(PAGE_TO_GUIDE_ANCHOR[cur] || 'dashboard');
}

function renderNav() {
  // Sidebar shows only the 5 top-level tabs. Drill-down to specific
  // parameters happens by clicking param chips in the formula cards on
  // the dashboard, or via dependency cards on a parameter's detail page.
  const current = stack[stack.length - 1];
  // Labels are plain text (no emoji). Use the first character as a monogram
  // glyph for the collapsed sidebar, where the text label is hidden.
  const navItem = (key, primaryLabel, sub, title) => {
    const text = String(primaryLabel).trim();
    const icon = [...text][0] || '•';
    const active = current === key ? ' active' : '';
    return `<div class="nav-item dashboard${active}" onclick="navigateRoot('${key}')" title="${escapeHtml(title || text)}">
      <span class="nav-icon">${escapeHtml(icon)}</span>
      <span class="nav-text"><strong>${escapeHtml(text)}</strong><span class="label">${escapeHtml(sub)}</span></span>
    </div>`;
  };
  const catLabel = lang === 'en' ? 'Component Library' : '部件库';
  const catSub   = lang === 'en' ? 'Forks · Shocks · Linkages …' : '前叉 · 避震 · 连杆 …';
  const dashHTML = [
    navItem('__dashboard', T('dashboard_nav'), T('dashboard_sub')),
    navItem('__chassis',   T('chassis_nav'),   T('chassis_sub')),
    navItem('__linkage',   T('linkage_nav'),   T('linkage_sub')),
    navItem('__datatable', T('datatable_nav'), T('datatable_sub')),
    navItem('__catalogs',  catLabel,           catSub),
    navItem('__guide',     T('guide_nav'),     T('guide_sub')),
  ].join('');
  document.getElementById('nav-channels').innerHTML = dashHTML;
}

function renderBreadcrumbs() {
  const el = document.getElementById('breadcrumbs');
  el.innerHTML = stack.map((id, i) => {
    const isLast = i === stack.length - 1;
    const cls = isLast ? 'crumb current' : 'crumb';
    const onClick = isLast ? '' : `onclick="navigateTo('${id}')"`;
    const label = id === '__dashboard' ? T('dashboard_nav')
                : id === '__datatable' ? T('datatable_nav')
                : id === '__chassis' ? T('chassis_nav')
                : id === '__linkage' ? T('linkage_nav')
                : id === '__catalogs' ? (lang === 'en' ? 'Component Library' : '部件库')
                : id === '__guide' ? T('guide_nav')
                : P[id].name;
    return `<span class="${cls}" ${onClick}>${escapeHtml(label)}</span>` +
      (isLast ? '' : '<span class="sep">›</span>');
  }).join('');
}

function renderDashboard() {
  let html = `<div class="header">
    <h1>${escapeHtml(T('dashboard_title'))}</h1>
    <span class="label-zh">${escapeHtml(T('dashboard_kicker'))}</span>
  </div>`;
  html += `<div class="desc">${escapeHtml(T('dashboard_desc'))}</div>`;

  const formulaCard = (id) => {
    const p = P[id];
    if (!p || !Array.isArray(p.formula)) return '';
    const titleClick = `onclick="event.stopPropagation(); navigateRoot('${id}')"`;
    return `<div class="formula-card ${p.type}">
      <div class="formula-card-head" ${titleClick}>
        <span class="formula-card-name">${escapeHtml(p.name)}</span>
        <span class="formula-card-label">${escapeHtml(tr(id,'label'))}</span>
        <span class="formula-card-unit">[ ${escapeHtml(p.unit)} ]</span>
      </div>
      <div class="formula-card-body">
        <strong style="color:var(--text)">${escapeHtml(p.name)}</strong> &nbsp;=&nbsp; ${renderFormula(tr(id,'formula'))}
      </div>
    </div>`;
  };

  const channels = Object.keys(P).filter(k => P[k].type === 'channel' && !isDynamicParam(k));
  const intermediates = Object.keys(P).filter(k => P[k].type === 'intermediate' && !isDynamicParam(k));

  html += `<div class="section-title">${escapeHtml(T('main_channels'))}</div>`;
  html += `<div class="formula-grid">${channels.map(formulaCard).join('')}</div>`;

  html += `<div class="section-title" style="margin-top:24px">${escapeHtml(T('intermediates'))}</div>`;
  html += `<div class="formula-grid">${intermediates.map(formulaCard).join('')}</div>`;

  document.getElementById('content').innerHTML = html;
}

function renderContent() {
  const id = stack[stack.length - 1];
  if (id === '__dashboard') return renderDashboard();
  if (id === '__datatable') {
    document.getElementById('content').innerHTML = renderDataTable({ values: state.values, bikes: state.bikes, dtCollapsed: state.dtCollapsed, lang });
    return;
  }
  if (id === '__chassis') {
    document.getElementById('content').innerHTML = renderChassisSetup({ values: state.values, lang });
    return;
  }
  if (id === '__linkage') {
    document.getElementById('content').innerHTML = renderLinkageSetup({ values: state.values, lang });
    return;
  }
  if (id === '__catalogs') {
    document.getElementById('content').innerHTML = renderCatalogEditor({ catalogKey: state.catalogTab, lang });
    return;
  }
  if (id === '__guide') {
    const anchor = state.guideAnchor || null;
    document.getElementById('content').innerHTML = renderUserGuide({ lang, anchor });
    if (anchor) {
      // One-shot — clear so subsequent re-renders don't keep re-scrolling.
      state.guideAnchor = null;
      const target = document.getElementById('guide-' + anchor);
      if (target) target.scrollIntoView({ block: 'start', behavior: 'smooth' });
    }
    return;
  }
  const p = P[id];
  let html = '';

  html += `<div class="header">
    <span class="badge ${p.type}">${typeLabel(p.type)}</span>
    <h1>${escapeHtml(p.name)}</h1>
    <span class="label-zh">${escapeHtml(tr(id,'label'))}</span>
    <span class="unit">[ ${escapeHtml(p.unit)} ]</span>
  </div>`;

  html += `<div class="desc">${escapeHtml(tr(id,'desc'))}</div>`;

  if (DIAGRAMS[id]) {
    html += `<div class="section-title">${escapeHtml(T('diagram_title'))}</div>`;
    html += bikeSVG(DIAGRAMS[id]());
  }

  if (p.type === 'input') {
    // Static-first: no in-page sliders. Point to the page that owns the field.
    const home = STATIC_INPUT_HOME[id];
    if (home) {
      const homeNav = home === 'chassis' ? '__chassis' : home === 'linkage' ? '__linkage' : '__datatable';
      const homeLabel = lang === 'en'
        ? (home === 'chassis' ? 'Chassis Setup' : home === 'linkage' ? 'Linkage Setup' : 'Data Table')
        : (home === 'chassis' ? '底盘设置' : home === 'linkage' ? '连杆几何' : '数据表');
      const editHere = lang === 'en' ? 'Edit on' : '编辑入口：';
      html += `<div class="footnote">${escapeHtml(editHere)} <a href="javascript:void(0)" onclick="navigateRoot('${homeNav}')" style="color:var(--channel)">${escapeHtml(homeLabel)}</a></div>`;
    }
    html += `<div class="section-title">${escapeHtml(T('param_info'))}</div>`;
    html += `<dl class="info-grid">
      <dt>${escapeHtml(T('source'))}</dt><dd>${escapeHtml(tr(id,'source'))}</dd>
      <dt>${escapeHtml(T('typical'))}</dt><dd>${escapeHtml(tr(id,'typical'))}</dd>
      <dt>${escapeHtml(T('drillable'))}</dt><dd style="color:var(--text-dim)">${escapeHtml(T('not_drillable'))}</dd>
    </dl>`;
  } else {
    html += `<div class="section-title">${escapeHtml(T('formula_title'))}</div>`;
    html += `<div class="formula-box">
      <strong style="color:var(--text)">${escapeHtml(p.name)}</strong> &nbsp;=&nbsp; ${renderFormula(tr(id,'formula'))}
    </div>`;

    if (p.note) {
      html += `<div class="footnote">${escapeHtml(tr(id,'note'))}</div>`;
    }

    html += `<div class="section-title">${escapeHtml(T('deps_title'))}</div>`;
    html += `<div class="deps-list">`;
    for (const depId of p.deps) {
      const d = P[depId];
      if (!d || isDynamicParam(depId)) continue;
      html += `<div class="dep-card" onclick="navigateTo('${depId}')">
        <div>
          <span class="dep-name">${escapeHtml(d.name)}</span>
          <span class="dep-label">${escapeHtml(tr(depId,'label'))} · ${escapeHtml(d.unit)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="badge ${d.type}">${typeLabel(d.type)}</span>
          <span class="dep-arrow">›</span>
        </div>
      </div>`;
    }
    html += `</div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function renderFormula(formula) {
  if (!Array.isArray(formula)) return '';
  // Multi-line formula: every element is itself an array, each inner
  // array is rendered as its own line. Used when a formula has a
  // primary expression plus one or more "where:" / sub-definition lines.
  const isMulti = formula.length > 0 && formula.every(s => Array.isArray(s));
  if (isMulti) {
    return formula.map((line, i) =>
      `<div class="formula-line${i === 0 ? '' : ' formula-line-aux'}">${renderFormulaSegments(line)}</div>`
    ).join('');
  }
  return renderFormulaSegments(formula);
}
function renderFormulaSegments(segs) {
  return segs.map(seg => {
    if (typeof seg === 'string') return escapeHtml(seg);
    if (seg && seg.ref && P[seg.ref]) {
      const p = P[seg.ref];
      return `<span class="param-chip ${p.type}" onclick="navigateTo('${seg.ref}')" title="${escapeHtml(tr(seg.ref,'label'))}${escapeHtml(T('drill_hint'))}">${escapeHtml(p.name)}</span>`;
    }
    return '';
  }).join('');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// Linkage live-readout drag: lets the user pull the yellow marker along
// the chart to read MR / Wheel Rate at any rear-wheel-travel position.
let __linkageReadoutDragging = false;
function linkageReadoutPointerToTravel(evt, svg) {
  const padL = +svg.dataset.padL, padR = +svg.dataset.padR;
  const W    = +svg.dataset.w;
  const xMax = +svg.dataset.xMax;
  const rect = svg.getBoundingClientRect();
  const xPx = ((evt.clientX - rect.left) / rect.width) * W;
  const f = Math.max(0, Math.min(1, (xPx - padL) / (W - padL - padR)));
  return f * xMax;
}
function linkageReadoutUpdate(svg, travelMm) {
  const padL = +svg.dataset.padL, padR = +svg.dataset.padR;
  const padT = +svg.dataset.padT, padB = +svg.dataset.padB;
  const W = +svg.dataset.w, H = +svg.dataset.h;
  const xMax = +svg.dataset.xMax;
  const mrYMin = +svg.dataset.mrYMin, mrYMax = +svg.dataset.mrYMax;
  const wrYMin = +svg.dataset.wrYMin, wrYMax = +svg.dataset.wrYMax;
  const s = JSON.parse(svg.dataset.samples);
  // nearest sample by travel
  let bi = 0, bd = Infinity;
  for (let i = 0; i < s.t.length; i++) {
    const d = Math.abs(s.t[i] - travelMm);
    if (d < bd) { bd = d; bi = i; }
  }
  const t = s.t[bi], mr = s.m[bi], wr = s.w[bi];
  const x = padL + (t / (xMax || 1)) * (W - padL - padR);
  const yMR = padT + (1 - (mr - mrYMin) / (mrYMax - mrYMin)) * (H - padT - padB);
  const yWR = padT + (1 - (wr - wrYMin) / (wrYMax - wrYMin)) * (H - padT - padB);
  const dotMR = svg.querySelector('#linkage-readout-dot-mr');
  const dotWR = svg.querySelector('#linkage-readout-dot-wr');
  const vline = svg.querySelector('#linkage-readout-vline');
  const txt   = svg.querySelector('#linkage-readout-text');
  if (dotMR) { dotMR.setAttribute('cx', x.toFixed(1)); dotMR.setAttribute('cy', yMR.toFixed(1)); }
  if (dotWR) { dotWR.setAttribute('cx', x.toFixed(1)); dotWR.setAttribute('cy', yWR.toFixed(1)); }
  if (vline) { vline.setAttribute('x1', x.toFixed(1)); vline.setAttribute('x2', x.toFixed(1)); }
  if (txt) {
    txt.textContent = lang === 'en'
      ? `Travel: ${t.toFixed(0)} mm   |   MR: ${mr.toFixed(2)}   |   Wheel Rate: ${wr.toFixed(1)} N/mm`
      : `行程: ${t.toFixed(0)} mm   |   MR: ${mr.toFixed(2)}   |   轮刚度: ${wr.toFixed(1)} N/mm`;
  }
}
function linkageReadoutDown(evt) {
  const svg = evt.currentTarget.ownerSVGElement || document.getElementById('linkage-chart-svg');
  if (!svg) return;
  __linkageReadoutDragging = true;
  evt.currentTarget.setPointerCapture && evt.currentTarget.setPointerCapture(evt.pointerId);
  linkageReadoutUpdate(svg, linkageReadoutPointerToTravel(evt, svg));
}
function linkageReadoutMove(evt) {
  if (!__linkageReadoutDragging) return;
  const svg = evt.currentTarget.ownerSVGElement || document.getElementById('linkage-chart-svg');
  if (!svg) return;
  linkageReadoutUpdate(svg, linkageReadoutPointerToTravel(evt, svg));
}
function linkageReadoutUp(evt) {
  __linkageReadoutDragging = false;
  if (evt.currentTarget && evt.currentTarget.releasePointerCapture && evt.pointerId != null) {
    try { evt.currentTarget.releasePointerCapture(evt.pointerId); } catch (e) {}
  }
}

render();
initSharedCatalogs();
</script>
