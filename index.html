<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MotoSPEC Formula Explorer · 公式探索器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a212b;
    --panel-2: #232c39;
    --border: #2d3847;
    --text: #e6edf3;
    --text-dim: #8b98a7;
    --accent: #4ea1ff;
    --accent-hover: #7ab8ff;
    --channel: #ff8c5a;
    --intermediate: #c084fc;
    --input: #4ade80;
    --formula-bg: #0c1116;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    --sidebar-w: 264px;
    background:
      radial-gradient(1200px 600px at -10% -10%, rgba(78,161,255,0.08), transparent 60%),
      radial-gradient(900px 600px at 110% 0%, rgba(255,140,90,0.05), transparent 55%),
      var(--bg);
    color: var(--text);
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Segoe UI", sans-serif;
    font-feature-settings: "ss01", "cv11";
    line-height: 1.55; min-height: 100vh;
    display: grid; grid-template-columns: var(--sidebar-w) 1fr;
    transition: grid-template-columns 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }
  body.sidebar-collapsed { --sidebar-w: 64px; }

  aside {
    background: linear-gradient(180deg, var(--panel) 0%, color-mix(in srgb, var(--panel) 92%, black) 100%);
    border-right: 1px solid var(--border);
    padding: 16px 12px; height: 100vh; overflow-y: auto; overflow-x: hidden;
    position: sticky; top: 0;
    display: flex; flex-direction: column; gap: 12px;
  }
  .sidebar-brand {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-brand .brand-mark {
    width: 30px; height: 30px; flex-shrink: 0;
    border-radius: 7px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--channel) 100%);
    display: grid; place-items: center;
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700; font-size: 15px; color: var(--bg);
    box-shadow: 0 4px 14px -4px rgba(78,161,255,0.5);
  }
  .sidebar-brand .brand-text {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 700; font-size: 15px; letter-spacing: -0.01em;
    color: var(--text); white-space: nowrap; overflow: hidden;
    transition: opacity 0.18s;
  }
  .sidebar-brand .brand-text small {
    display: block; font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 500; letter-spacing: 0.18em;
    color: var(--text-dim); text-transform: uppercase; margin-top: 1px;
  }
  .sidebar-toggle {
    position: absolute; top: 14px; right: 10px;
    width: 22px; height: 22px; border-radius: 6px;
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text-dim); cursor: pointer; z-index: 10;
    display: grid; place-items: center;
    font-size: 12px; line-height: 1; transition: all 0.18s;
  }
  body.sidebar-collapsed .sidebar-toggle {
    position: relative; top: auto; right: auto; margin: 4px auto 0;
  }
  .sidebar-toggle:hover { color: var(--accent); border-color: var(--accent); transform: scale(1.08); }
  body.sidebar-collapsed .sidebar-toggle { transform: rotate(180deg); }
  body.sidebar-collapsed .sidebar-toggle:hover { transform: rotate(180deg) scale(1.08); }

  aside h2 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 500; letter-spacing: 0.18em;
    color: var(--text-dim); text-transform: uppercase;
    margin: 12px 4px 6px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 7px;
    cursor: pointer; color: var(--text); font-size: 13.5px; font-weight: 500;
    border: 1px solid transparent; transition: background 0.15s, border-color 0.15s, transform 0.15s;
    margin-bottom: 2px; position: relative; overflow: hidden;
    white-space: nowrap;
  }
  .nav-item .nav-icon {
    flex-shrink: 0; font-size: 16px; line-height: 1;
    width: 22px; text-align: center;
  }
  .nav-item .nav-text {
    display: flex; flex-direction: column; gap: 1px; min-width: 0; overflow: hidden;
    transition: opacity 0.18s;
  }
  .nav-item .nav-text strong { font-weight: 600; font-size: 13.5px; }
  .nav-item .nav-text .label { color: var(--text-dim); font-size: 11px; font-weight: 400; }
  .nav-item:hover { background: var(--panel-2); border-color: var(--border); }
  .nav-item:hover .nav-icon { transform: scale(1.1); }
  .nav-item.active {
    background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 14%, transparent) 0%, var(--panel-2) 60%);
    border-color: color-mix(in srgb, var(--accent) 35%, transparent);
  }
  .nav-item.active::before {
    content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
    width: 3px; background: var(--accent); border-radius: 0 3px 3px 0;
  }

  body.sidebar-collapsed aside { padding-left: 8px; padding-right: 8px; }
  body.sidebar-collapsed aside h2,
  body.sidebar-collapsed .brand-text,
  body.sidebar-collapsed .nav-text,
  body.sidebar-collapsed .lang-btn span.lang-full { display: none; }
  body.sidebar-collapsed .nav-item { justify-content: center; padding: 10px 6px; }
  body.sidebar-collapsed .nav-item .nav-icon { width: auto; }
  body.sidebar-collapsed .lang-bar { flex-direction: column; gap: 4px; padding-bottom: 8px; }
  body.sidebar-collapsed .lang-btn { padding: 5px 0; font-size: 10px; }

  main {
    padding: 24px clamp(20px, 3vw, 44px);
    width: 100%; min-width: 0;
  }
  .breadcrumbs {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 6px; margin-bottom: 20px; font-size: 13px; color: var(--text-dim);
  }
  .breadcrumbs .crumb {
    cursor: pointer; padding: 3px 8px; border-radius: 4px;
    color: var(--accent); transition: background 0.15s;
  }
  .breadcrumbs .crumb:hover { background: var(--panel-2); }
  .breadcrumbs .sep { color: var(--text-dim); }
  .breadcrumbs .crumb.current { color: var(--text); cursor: default; }

  .header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
  h1 { font-size: 28px; font-weight: 600; }
  .unit { color: var(--text-dim); font-size: 16px; font-weight: 400; }
  .label-zh { color: var(--text-dim); font-size: 16px; font-weight: 400; }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge.channel { background: rgba(255, 140, 90, 0.15); color: var(--channel); }
  .badge.intermediate { background: rgba(192, 132, 252, 0.15); color: var(--intermediate); }
  .badge.input { background: rgba(74, 222, 128, 0.15); color: var(--input); }

  .desc {
    color: var(--text-dim); margin-top: 12px; margin-bottom: 24px;
    padding: 14px 18px; background: var(--panel); border-left: 3px solid var(--accent);
    border-radius: 4px; font-size: 14px;
  }

  .section-title {
    font-size: 13px; font-weight: 600; letter-spacing: 1px; color: var(--text-dim);
    text-transform: uppercase; margin-top: 28px; margin-bottom: 12px;
  }
  .formula-box {
    background: var(--formula-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 24px 28px; font-size: 19px;
    font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
    line-height: 2.2; word-spacing: 2px; overflow-x: auto;
  }
  .param-chip {
    display: inline-block; padding: 2px 10px; border-radius: 5px;
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--accent); cursor: pointer; transition: all 0.15s;
    font-size: 17px; font-weight: 500; margin: 2px 1px;
  }
  .param-chip:hover {
    background: var(--accent); color: var(--bg); border-color: var(--accent);
    transform: translateY(-1px);
  }
  .param-chip.input { color: var(--input); }
  .param-chip.input:hover { background: var(--input); color: var(--bg); border-color: var(--input); }
  .param-chip.intermediate { color: var(--intermediate); }
  .param-chip.intermediate:hover { background: var(--intermediate); color: var(--bg); border-color: var(--intermediate); }
  .param-chip.channel { color: var(--channel); }
  .param-chip.channel:hover { background: var(--channel); color: var(--bg); border-color: var(--channel); }

  .deps-list { display: grid; gap: 8px; }
  .dep-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; transition: all 0.15s;
  }
  .dep-card:hover { background: var(--panel-2); border-color: var(--accent); transform: translateX(2px); }
  .dep-card .dep-name { font-family: "SF Mono", Monaco, monospace; color: var(--accent); font-weight: 500; }
  .dep-card .dep-label { color: var(--text-dim); font-size: 13px; margin-left: 10px; }
  .dep-card .dep-arrow { color: var(--text-dim); }

  .info-grid {
    display: grid; grid-template-columns: 140px 1fr; gap: 10px 20px;
    padding: 16px 18px; background: var(--panel); border-radius: 6px;
    border: 1px solid var(--border); font-size: 14px;
  }
  .info-grid dt { color: var(--text-dim); font-weight: 500; }
  .info-grid dd { color: var(--text); }

  .footnote { color: var(--text-dim); font-size: 13px; margin-top: 16px; padding: 10px 14px; background: var(--panel); border-radius: 4px; }

  .bike-svg {
    width: 100%; max-width: 760px; height: auto;
    background: var(--formula-bg);
    border: 1px solid var(--border); border-radius: 8px;
    display: block; margin-bottom: 6px;
  }
  .diagram-note { font-size: 12px; color: var(--text-dim); margin-top: 2px; padding-left: 4px; }

  /* ===== Live calculator additions ===== */
  .live-value {
    display: inline-block; padding: 4px 12px; border-radius: 6px;
    background: rgba(74, 222, 128, 0.12); border: 1px solid rgba(74, 222, 128, 0.4);
    color: var(--input); font-family: "SF Mono", Monaco, monospace;
    font-size: 16px; font-weight: 600;
  }
  .live-value.channel { background: rgba(255,140,90,0.12); border-color: rgba(255,140,90,0.4); color: var(--channel); }
  .live-value.intermediate { background: rgba(192,132,252,0.12); border-color: rgba(192,132,252,0.4); color: var(--intermediate); }

  .input-control {
    display: grid; grid-template-columns: 1fr 130px; gap: 16px; align-items: center;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 18px 20px;
  }
  .input-control input[type="range"] { width: 100%; accent-color: var(--input); }
  .input-control input[type="number"] {
    background: var(--formula-bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 5px; padding: 7px 10px; font-family: "SF Mono", Monaco, monospace;
    font-size: 14px; width: 100%;
  }
  .input-control .range-label { display: flex; justify-content: space-between; color: var(--text-dim); font-size: 11px; margin-top: 5px; }

  .dash-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
  }
  .dash-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 18px; cursor: pointer; transition: all 0.15s;
  }
  .dash-card:hover { border-color: var(--channel); transform: translateY(-2px); }
  .dash-card.intermediate:hover { border-color: var(--intermediate); }
  .dash-card .dash-label { color: var(--text-dim); font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
  .dash-card .dash-name { color: var(--text); font-size: 13px; font-family: "SF Mono", Monaco, monospace; margin-bottom: 10px; }
  .dash-card .dash-val { color: var(--channel); font-size: 22px; font-weight: 700; font-family: "SF Mono", Monaco, monospace; }
  .dash-card.intermediate .dash-val { color: var(--intermediate); }

  /* Formula cards on the dashboard */
  .formula-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 12px;
  }
  .formula-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px; transition: border-color 0.15s;
  }
  .formula-card.channel:hover      { border-color: var(--channel); }
  .formula-card.intermediate:hover { border-color: var(--intermediate); }
  .formula-card-head {
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
    margin-bottom: 10px; cursor: pointer;
  }
  .formula-card-head:hover { opacity: 0.85; }
  .formula-card-name { color: var(--text); font-family: "SF Mono", Monaco, monospace; font-weight: 700; font-size: 14px; }
  .formula-card.channel      .formula-card-name { color: var(--channel); }
  .formula-card.intermediate .formula-card-name { color: var(--intermediate); }
  .formula-card-label { color: var(--text-dim); font-size: 12px; }
  .formula-card-unit  { color: var(--text-dim); font-size: 11px; margin-left: auto; }
  .formula-card-body  { font-family: "SF Mono", Monaco, monospace; font-size: 13px; line-height: 1.7; color: var(--text); word-break: break-word; }
  .formula-line { display: block; margin: 2px 0; }
  .formula-line.formula-line-aux { color: var(--text-dim); font-size: 0.92em; padding-left: 12px; border-left: 2px solid var(--border); margin-top: 6px; }

  .preset-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
  .preset-btn {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 7px 12px; border-radius: 5px; font-size: 12px; cursor: pointer;
    transition: all 0.15s; font-family: inherit;
  }
  .preset-btn:hover { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .preset-btn.reset { color: var(--text-dim); }
  .preset-btn.reset:hover { background: var(--panel); color: var(--text); border-color: var(--text-dim); }

  .nav-item.dashboard { background: rgba(78,161,255,0.08); border-color: rgba(78,161,255,0.3); margin-bottom: 14px; }
  .nav-item.dashboard.active { background: rgba(78,161,255,0.15); border-color: var(--accent); }

  .lang-bar {
    display: flex; gap: 6px; margin-bottom: 18px; padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .lang-btn {
    flex: 1; background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text-dim); padding: 7px 0; border-radius: 5px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; font-family: inherit; letter-spacing: 0.5px;
  }
  .lang-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .lang-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

  @media (max-width: 768px) {
    body { grid-template-columns: 1fr; --sidebar-w: 100%; }
    aside { position: static; height: auto; max-height: 240px; }
    main { padding: 20px 16px; }
    .input-control { grid-template-columns: 1fr; }
    .sidebar-toggle { display: none; }
  }

  /* Typography polish — distinctive but legible */
  h1 {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 600; letter-spacing: -0.02em; font-size: 30px;
  }
  .formula-box, .param-chip,
  .formula-card-name, .formula-card-body,
  .live-value, .dash-card .dash-name, .dash-card .dash-val,
  .dep-card .dep-name {
    font-family: 'JetBrains Mono', monospace !important;
  }
  .section-title {
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.16em;
  }
  .breadcrumbs {
    padding: 8px 12px; background: color-mix(in srgb, var(--panel) 70%, transparent);
    border: 1px solid var(--border); border-radius: 8px;
    backdrop-filter: blur(6px);
  }
/* ==== Chassis Setup ==== */
.chassis-page { max-width: none; }
.chassis-desc { color: var(--text-dim, #94a3b8); font-size: 13px; margin: 6px 0 14px; }
.chassis-readout-strip { margin-bottom: 14px; }
.chassis-diagram-wrap { background: var(--formula-bg, #0f141b); border: 1px solid rgba(148, 163, 184, 0.18); border-radius: 8px; padding: 8px; margin-bottom: 14px; }
.chassis-diagram { width: 100%; height: auto; display: block; }
.chassis-actions { display: flex; gap: 10px; align-items: center; margin-bottom: 18px; flex-wrap: wrap; }
.chassis-library, .chassis-btn { background: #1f2630; color: var(--text); border: 1px solid rgba(148,163,184,0.3); border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
.chassis-library:hover, .chassis-btn:hover { border-color: #4ea1ff; }
.chassis-group { margin-bottom: 18px; background: var(--panel); border: 1px solid rgba(148,163,184,0.15); border-radius: 8px; padding: 14px; }
.chassis-group-title { font-size: 15px; font-weight: 600; margin: 0 0 10px; color: #cbd5e1; }
.chassis-table-wrap { overflow-x: auto; max-width: 100%; }
.chassis-table { border-collapse: collapse; width: auto; font-size: 12px; background: var(--panel); color: var(--text); }
.chassis-table th, .chassis-table td { border: 1px solid var(--border); padding: 2px 6px; line-height: 1.25; text-align: left; vertical-align: middle; white-space: nowrap; }
.chassis-table thead th { background: var(--panel); color: var(--accent); font-weight: 600; font-size: 11px; }
.chassis-table .chassis-input { width: 100%; min-width: 70px; box-sizing: border-box; background: var(--formula-bg, #111); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 1px 4px; font: inherit; font-size: 12px; }
.chassis-table .chassis-input:focus { outline: none; border-color: var(--accent); }
.chassis-input:focus { outline: none; border-color: #4ea1ff; }

/* Data Table */
.dt-wrap { overflow-x: auto; max-width: 100%; }
.dt-bike-head { position: relative; }
.dt-col-remove {
  position: absolute; top: 2px; right: 2px;
  background: transparent; color: #94a3b8; border: 1px solid rgba(148,163,184,0.25);
  border-radius: 4px; cursor: pointer;
  width: 18px; height: 18px; line-height: 14px; font-size: 12px; padding: 0;
}
.dt-col-remove:hover { color: #f87171; border-color: #f87171; }
.dt-col-add {
  background: rgba(78,161,255,0.10); color: #4ea1ff;
  border: 1px dashed rgba(78,161,255,0.6); border-radius: 5px;
  padding: 4px 10px; font-size: 12px; cursor: pointer; white-space: nowrap;
}
.dt-col-add:hover { background: rgba(78,161,255,0.18); border-style: solid; }
.dt-bike-add { vertical-align: middle; }
.dt-empty { display: flex; justify-content: center; padding: 32px 16px; }
.dt-empty-hint { color: var(--text-dim); font-size: 13px; text-align: center; padding-bottom: 16px; }
table.dt {
  border-collapse: collapse;
  width: 100%;
  font-size: 12px;
  background: var(--panel);
  color: var(--text);
}
/* Compact mode: squash vertical space so the whole table fits on one screen. */
table.dt.dt-compact th, table.dt.dt-compact td { padding: 2px 6px; line-height: 1.25; }
table.dt.dt-compact .dt-input,
table.dt.dt-compact .dt-bike-name,
table.dt.dt-compact .dt-readonly span { padding: 1px 4px; font-size: 12px; }
table.dt.dt-compact .dt-status { font-size: 8px; padding: 0 4px; margin-left: 4px; }
table.dt.dt-compact tr.dt-group th { padding: 3px 6px; font-size: 11px; letter-spacing: 0.4px; }
table.dt th, table.dt td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
  vertical-align: top;
}
table.dt thead th {
  background: var(--panel);
  color: var(--accent);
  font-weight: 600;
  position: sticky; top: 0;
}
table.dt th.dt-spec {
  position: sticky; left: 0;
  background: var(--panel);
  font-weight: 500;
  white-space: nowrap;
  z-index: 1;
}
table.dt thead th.dt-spec {
  z-index: 2;
}
table.dt tbody tr:nth-child(even) td,
table.dt tbody tr:nth-child(even) th {
  background: rgba(255,255,255,0.02);
}
table.dt tr.dt-group th {
  background: var(--panel);
  color: var(--accent);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 12px;
  border-top: 2px solid var(--accent);
}
table.dt td.dt-current,
table.dt th.dt-current {
  border-left: 2px solid var(--accent);
  font-weight: 500;
}
table.dt .dt-preset {
  color: var(--text-dim);
  font-size: 11px;
  font-weight: 400;
}
table.dt input.dt-input,
table.dt select.dt-input {
  width: 100%;
  box-sizing: border-box;
  background: var(--formula-bg, #111);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 6px;
  font: inherit;
  font-size: 12px;
}
table.dt input.dt-input:focus,
table.dt select.dt-input:focus {
  outline: none;
  border-color: var(--accent);
}
table.dt input.dt-bike-name {
  font-weight: 600;
  color: var(--accent);
}
table.dt td.dt-readonly {
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}
table.dt td.dt-readonly span {
  color: var(--text);
}
.dt-status {
  display: inline-block;
  margin-left: 6px;
  padding: 1px 6px;
  border-radius: 3px;

function toggleSidebar() {

function d2r(d){ return d * Math.PI / 180; }
function arcD(cx, cy, r, a1, a2, sweep, large) {
  const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
  const x2 = cx + r*Math.cos(a2), y2 = cy + r*Math.sin(a2);
  return `M ${x1.toFixed(1)} ${y1.toFixed(1)} A ${r} ${r} 0 ${large||0} ${sweep||0} ${x2.toFixed(1)} ${y2.toFixed(1)}`;
}

}

const _rake = () => {
  const b = BIKE, sh = b.steeringHead, fa = b.frontAxle;

  const a2 = Math.atan2(fa.y - sh.y, fa.x - sh.x);

// === Trail (static) ===
DIAGRAMS.Trail_Static = () => {
  const b = BIKE, sh = b.steeringHead, fa = b.frontAxle;
  const dx = fa.x - sh.x, dy = fa.y - sh.y, len = Math.hypot(dx, dy);
  const ux = dx/len, uy = dy/len;
  const t = (b.groundY - sh.y) / uy;
  const gx = sh.x + ux * t;
  return `
    <line x1="${sh.x}" y1="${sh.y}" x2="${gx.toFixed(1)}" y2="${b.groundY}" stroke="${SC.hi}" stroke-width="2" stroke-dasharray="6,4" opacity="0.8"/>

    <circle cx="${gx.toFixed(1)}" cy="${b.groundY}" r="3.5" fill="${SC.hi}"/>

let stack = ['__dashboard'];

function typeLabel(t) {
  return ({channel: T('type_channel'), intermediate: T('type_intermediate'), input: T('type_input')})[t] || t;
}

function navigateTo(id) {
  if (id !== '__dashboard' && id !== '__datatable' && id !== '__chassis' && id !== '__linkage' && id !== '__catalogs' && id !== '__guide' && !P[id]) return;
  if (stack[stack.length - 1] === id) return;
  const idx = stack.indexOf(id);
  if (idx >= 0) stack = stack.slice(0, idx + 1);
  else stack.push(id);
  render();
}

function navigateRoot(id) {
  if (id !== '__dashboard' && id !== '__datatable' && id !== '__chassis' && id !== '__linkage' && id !== '__catalogs' && id !== '__guide' && !P[id]) return;
  stack = [id];

function renderFormula(formula) {
  if (!Array.isArray(formula)) return '';
  // Multi-line formula: every element is itself an array, each inner
  // array is rendered as its own line. Used when a formula has a
  // primary expression plus one or more "where:" / sub-definition lines.
  const isMulti = formula.length > 0 && formula.every(s => Array.isArray(s));
  if (isMulti) {
    return formula.map((line, i) =>
      `<div class="formula-line${i === 0 ? '' : ' formula-line-aux'}">${renderFormulaSegments(line)}</div>`
    ).join('');
  }
  return renderFormulaSegments(formula);
}
function renderFormulaSegments(segs) {
  return segs.map(seg => {
    if (typeof seg === 'string') return escapeHtml(seg);
    if (seg && seg.ref && P[seg.ref]) {
      const p = P[seg.ref];
      return `<span class="param-chip ${p.type}" onclick="navigateTo('${seg.ref}')" title="${escapeHtml(tr(seg.ref,'label'))}${escapeHtml(T('drill_hint'))}">${escapeHtml(p.name)}</span>`;
    }
    return '';
  }).join('');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// Linkage live-readout drag: lets the user pull the yellow marker along
// the chart to read MR / Wheel Rate at any rear-wheel-travel position.
let __linkageReadoutDragging = false;
function linkageReadoutPointerToTravel(evt, svg) {
  const padL = +svg.dataset.padL, padR = +svg.dataset.padR;
  const W    = +svg.dataset.w;
  const xMax = +svg.dataset.xMax;
  const rect = svg.getBoundingClientRect();
  const xPx = ((evt.clientX - rect.left) / rect.width) * W;
  const f = Math.max(0, Math.min(1, (xPx - padL) / (W - padL - padR)));
  return f * xMax;
}

  const padT = +svg.dataset.padT, padB = +svg.dataset.padB;
