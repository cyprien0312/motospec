<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MotoSPEC Formula Explorer · 公式探索器</title>
<style>
  :root {
    --bg: #0f1419;
    --panel: #1a212b;
    --panel-2: #232c39;
    --border: #2d3847;
    --text: #e6edf3;
    --text-dim: #8b98a7;
    --accent: #4ea1ff;
    --accent-hover: #7ab8ff;
    --channel: #ff8c5a;
    --intermediate: #c084fc;
    --input: #4ade80;
    --formula-bg: #0c1116;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Segoe UI", sans-serif;
    line-height: 1.6; min-height: 100vh;
    display: grid; grid-template-columns: 280px 1fr;
  }
  aside {
    background: var(--panel); border-right: 1px solid var(--border);
    padding: 20px 16px; height: 100vh; overflow-y: auto; position: sticky; top: 0;
  }
  aside h2 {
    font-size: 12px; font-weight: 600; letter-spacing: 1px;
    color: var(--text-dim); text-transform: uppercase;
    margin-bottom: 10px; margin-top: 18px;
  }
  aside h2:first-child { margin-top: 0; }
  .nav-item {
    display: block; padding: 8px 12px; border-radius: 6px;
    cursor: pointer; color: var(--text); font-size: 14px;
    border: 1px solid transparent; transition: all 0.15s;
    margin-bottom: 4px;
  }
  .nav-item:hover { background: var(--panel-2); border-color: var(--border); }
  .nav-item.active { background: var(--panel-2); border-color: var(--accent); }
  .nav-item .label { color: var(--text-dim); font-size: 12px; margin-left: 6px; }

  main { padding: 28px 36px; max-width: 1000px; }
  .breadcrumbs {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 6px; margin-bottom: 20px; font-size: 13px; color: var(--text-dim);
  }
  .breadcrumbs .crumb {
    cursor: pointer; padding: 3px 8px; border-radius: 4px;
    color: var(--accent); transition: background 0.15s;
  }
  .breadcrumbs .crumb:hover { background: var(--panel-2); }
  .breadcrumbs .sep { color: var(--text-dim); }
  .breadcrumbs .crumb.current { color: var(--text); cursor: default; }

  .header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
  h1 { font-size: 28px; font-weight: 600; }
  .unit { color: var(--text-dim); font-size: 16px; font-weight: 400; }
  .label-zh { color: var(--text-dim); font-size: 16px; font-weight: 400; }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge.channel { background: rgba(255, 140, 90, 0.15); color: var(--channel); }
  .badge.intermediate { background: rgba(192, 132, 252, 0.15); color: var(--intermediate); }
  .badge.input { background: rgba(74, 222, 128, 0.15); color: var(--input); }

  .desc {
    color: var(--text-dim); margin-top: 12px; margin-bottom: 24px;
    padding: 14px 18px; background: var(--panel); border-left: 3px solid var(--accent);
    border-radius: 4px; font-size: 14px;
  }

  .section-title {
    font-size: 13px; font-weight: 600; letter-spacing: 1px; color: var(--text-dim);
    text-transform: uppercase; margin-top: 28px; margin-bottom: 12px;
  }
  .formula-box {
    background: var(--formula-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 24px 28px; font-size: 19px;
    font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
    line-height: 2.2; word-spacing: 2px; overflow-x: auto;
  }
  .param-chip {
    display: inline-block; padding: 2px 10px; border-radius: 5px;
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--accent); cursor: pointer; transition: all 0.15s;
    font-size: 17px; font-weight: 500; margin: 2px 1px;
  }
  .param-chip:hover {
    background: var(--accent); color: var(--bg); border-color: var(--accent);
    transform: translateY(-1px);
  }
  .param-chip.input { color: var(--input); }
  .param-chip.input:hover { background: var(--input); color: var(--bg); border-color: var(--input); }
  .param-chip.intermediate { color: var(--intermediate); }
  .param-chip.intermediate:hover { background: var(--intermediate); color: var(--bg); border-color: var(--intermediate); }
  .param-chip.channel { color: var(--channel); }
  .param-chip.channel:hover { background: var(--channel); color: var(--bg); border-color: var(--channel); }

  .deps-list { display: grid; gap: 8px; }
  .dep-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; cursor: pointer; transition: all 0.15s;
  }
  .dep-card:hover { background: var(--panel-2); border-color: var(--accent); transform: translateX(2px); }
  .dep-card .dep-name { font-family: "SF Mono", Monaco, monospace; color: var(--accent); font-weight: 500; }
  .dep-card .dep-label { color: var(--text-dim); font-size: 13px; margin-left: 10px; }
  .dep-card .dep-arrow { color: var(--text-dim); }

  .info-grid {
    display: grid; grid-template-columns: 140px 1fr; gap: 10px 20px;
    padding: 16px 18px; background: var(--panel); border-radius: 6px;
    border: 1px solid var(--border); font-size: 14px;
  }
  .info-grid dt { color: var(--text-dim); font-weight: 500; }
  .info-grid dd { color: var(--text); }

  .footnote { color: var(--text-dim); font-size: 13px; margin-top: 16px; padding: 10px 14px; background: var(--panel); border-radius: 4px; }

  .bike-svg {
    width: 100%; max-width: 760px; height: auto;
    background: var(--formula-bg);
    border: 1px solid var(--border); border-radius: 8px;
    display: block; margin-bottom: 6px;
  }
  .diagram-note { font-size: 12px; color: var(--text-dim); margin-top: 2px; padding-left: 4px; }

  /* ===== Live calculator additions ===== */
  .live-value {
    display: inline-block; padding: 4px 12px; border-radius: 6px;
    background: rgba(74, 222, 128, 0.12); border: 1px solid rgba(74, 222, 128, 0.4);
    color: var(--input); font-family: "SF Mono", Monaco, monospace;
    font-size: 16px; font-weight: 600;
  }
  .live-value.channel { background: rgba(255,140,90,0.12); border-color: rgba(255,140,90,0.4); color: var(--channel); }
  .live-value.intermediate { background: rgba(192,132,252,0.12); border-color: rgba(192,132,252,0.4); color: var(--intermediate); }

  .input-control {
    display: grid; grid-template-columns: 1fr 130px; gap: 16px; align-items: center;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 18px 20px;
  }
  .input-control input[type="range"] { width: 100%; accent-color: var(--input); }
  .input-control input[type="number"] {
    background: var(--formula-bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 5px; padding: 7px 10px; font-family: "SF Mono", Monaco, monospace;
    font-size: 14px; width: 100%;
  }
  .input-control .range-label { display: flex; justify-content: space-between; color: var(--text-dim); font-size: 11px; margin-top: 5px; }

  .dash-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
  }
  .dash-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px 18px; cursor: pointer; transition: all 0.15s;
  }
  .dash-card:hover { border-color: var(--channel); transform: translateY(-2px); }
  .dash-card.intermediate:hover { border-color: var(--intermediate); }
  .dash-card .dash-label { color: var(--text-dim); font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; }
  .dash-card .dash-name { color: var(--text); font-size: 13px; font-family: "SF Mono", Monaco, monospace; margin-bottom: 10px; }
  .dash-card .dash-val { color: var(--channel); font-size: 22px; font-weight: 700; font-family: "SF Mono", Monaco, monospace; }
  .dash-card.intermediate .dash-val { color: var(--intermediate); }

  .preset-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
  .preset-btn {
    background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
    padding: 7px 12px; border-radius: 5px; font-size: 12px; cursor: pointer;
    transition: all 0.15s; font-family: inherit;
  }
  .preset-btn:hover { background: var(--accent); border-color: var(--accent); color: var(--bg); }
  .preset-btn.reset { color: var(--text-dim); }
  .preset-btn.reset:hover { background: var(--panel); color: var(--text); border-color: var(--text-dim); }

  .nav-item.dashboard { background: rgba(78,161,255,0.08); border-color: rgba(78,161,255,0.3); margin-bottom: 14px; }
  .nav-item.dashboard.active { background: rgba(78,161,255,0.15); border-color: var(--accent); }

  .lang-bar {
    display: flex; gap: 6px; margin-bottom: 18px; padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .lang-btn {
    flex: 1; background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text-dim); padding: 7px 0; border-radius: 5px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    transition: all 0.15s; font-family: inherit; letter-spacing: 0.5px;
  }
  .lang-btn:hover { color: var(--text); border-color: var(--text-dim); }
  .lang-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

  @media (max-width: 768px) {
    body { grid-template-columns: 1fr; }
    aside { position: static; height: auto; max-height: 240px; }
    main { padding: 20px 16px; }
    .input-control { grid-template-columns: 1fr; }
  }
/* Data Table */
.dt-wrap { overflow-x: auto; max-width: 100%; }
table.dt {
  border-collapse: collapse;
  width: 100%;
  font-size: 12px;
  background: var(--panel);
  color: var(--text);
}
/* Compact mode: squash vertical space so the whole table fits on one screen. */
table.dt.dt-compact th, table.dt.dt-compact td { padding: 2px 6px; line-height: 1.25; }
table.dt.dt-compact .dt-input,
table.dt.dt-compact .dt-bike-name,
table.dt.dt-compact .dt-readonly span { padding: 1px 4px; font-size: 12px; }
table.dt.dt-compact .dt-status { font-size: 8px; padding: 0 4px; margin-left: 4px; }
table.dt.dt-compact tr.dt-group th { padding: 3px 6px; font-size: 11px; letter-spacing: 0.4px; }
table.dt th, table.dt td {
  border: 1px solid var(--border);
  padding: 6px 10px;
  text-align: left;
  vertical-align: top;
}
table.dt thead th {
  background: var(--panel);
  color: var(--accent);
  font-weight: 600;
  position: sticky; top: 0;
}
table.dt th.dt-spec {
  position: sticky; left: 0;
  background: var(--panel);
  font-weight: 500;
  white-space: nowrap;
  z-index: 1;
}
table.dt thead th.dt-spec {
  z-index: 2;
}
table.dt tbody tr:nth-child(even) td,
table.dt tbody tr:nth-child(even) th {
  background: rgba(255,255,255,0.02);
}
table.dt tr.dt-group th {
  background: var(--panel);
  color: var(--accent);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-size: 12px;
  border-top: 2px solid var(--accent);
}
table.dt td.dt-current,
table.dt th.dt-current {
  border-left: 2px solid var(--accent);
  font-weight: 500;
}
table.dt .dt-preset {
  color: var(--text-dim);
  font-size: 11px;
  font-weight: 400;
}
table.dt input.dt-input,
table.dt select.dt-input {
  width: 100%;
  box-sizing: border-box;
  background: var(--formula-bg, #111);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 6px;
  font: inherit;
  font-size: 12px;
}
table.dt input.dt-input:focus,
table.dt select.dt-input:focus {
  outline: none;
  border-color: var(--accent);
}
table.dt input.dt-bike-name {
  font-weight: 600;
  color: var(--accent);
}
table.dt td.dt-readonly {
  color: var(--text-dim);
  font-variant-numeric: tabular-nums;
}
table.dt td.dt-readonly span {
  color: var(--text);
}
.dt-status {
  display: inline-block;
  margin-left: 6px;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.4px;
  vertical-align: middle;
  cursor: help;
}
.dt-status-pending { background: rgba(239, 68, 68, 0.15);  color: #f87171; border: 1px solid rgba(239, 68, 68, 0.4); }
.dt-status-coords  { background: rgba(251, 191, 36, 0.15); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.4); }
.dt-status-static  { background: rgba(148, 163, 184, 0.15); color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.4); }

/* ==== Catalog editor ==== */
.cat-wrap { max-width: 100%; }
.cat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 12px; flex-wrap: wrap; }
.cat-header h1 { font-size: 22px; }
.cat-actions { display: flex; gap: 6px; }
.cat-help { color: var(--text-dim); font-size: 12px; margin-bottom: 12px; }
.cat-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
.cat-tab {
  background: transparent; color: var(--text-dim); border: 0;
  padding: 8px 14px; cursor: pointer; font-size: 13px;
  border-bottom: 2px solid transparent; transition: all 0.15s;
}
.cat-tab:hover { color: var(--text); }
.cat-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
table.cat-table {
  width: 100%; border-collapse: collapse; font-size: 12px;
  background: var(--panel); border: 1px solid var(--border);
}
table.cat-table th, table.cat-table td { padding: 4px 6px; border: 1px solid var(--border); text-align: left; }
table.cat-table th { background: var(--panel-2); font-weight: 600; font-size: 11px; color: var(--text-dim); }
table.cat-table td.cat-id code { color: var(--accent); font-size: 11px; }
table.cat-table tr.cat-add-row { background: rgba(78,161,255,0.05); }
.cat-input {
  width: 100%; min-width: 80px; padding: 4px 6px;
  background: var(--formula-bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 3px; font-size: 12px;
  font-family: inherit;
}
.cat-input:focus { outline: none; border-color: var(--accent); }
.cat-btn {
  background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
  padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;
}
.cat-btn:hover { background: var(--border); }
.cat-btn-primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.cat-btn-primary:hover { background: var(--accent-hover); }
.cat-btn-danger { color: #f87171; border-color: rgba(239,68,68,0.4); padding: 2px 8px; }
.cat-btn-danger:hover { background: rgba(239,68,68,0.15); }
.cat-btn-warn { color: #fbbf24; border-color: rgba(251,191,36,0.4); }
.cat-btn-warn:hover { background: rgba(251,191,36,0.1); }

/* Linkage Setup page */
.linkage-page .header { margin-bottom: 6px; }
.linkage-readout-strip {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 10px; margin-bottom: 8px;
}
.linkage-readout {
  background: var(--panel); border: 1px solid var(--border);
  border-left: 3px solid var(--accent); border-radius: 6px;
  padding: 10px 14px;
}
.linkage-readout-label { color: var(--text-dim); font-size: 12px; letter-spacing: 0.5px; }
.linkage-readout-val { color: var(--text); font-size: 20px; font-weight: 600; margin-top: 2px; }
.linkage-svg {
  width: 100%; max-width: 720px; height: auto;
  background: var(--formula-bg); border: 1px solid var(--border);
  border-radius: 8px; display: block;
}
.linkage-chart-wrap { margin: 8px 0 14px 0; }
.linkage-chart {
  width: 100%; max-width: 720px; height: auto;
  background: var(--formula-bg); border: 1px solid var(--border);
  border-radius: 8px; display: block;
}
.linkage-chart-empty {
  background: var(--formula-bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 18px; color: var(--text-dim);
  font-size: 13px; text-align: center;
}
.linkage-points-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 12px;
}
.linkage-point {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 6px; padding: 12px 14px;
}
.linkage-point-label { font-weight: 600; font-size: 14px; color: var(--text); }
.linkage-point-desc { color: var(--text-dim); font-size: 12px; margin: 4px 0 10px 0; line-height: 1.45; }
.linkage-xy-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.linkage-xy-row label {
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-areas: "name unit" "input input";
  column-gap: 6px; row-gap: 4px; align-items: center;
  font-size: 12px; color: var(--text-dim); min-width: 0;
}
.linkage-xy-row label > span:first-child { grid-area: name; }
.linkage-xy-row label > .linkage-unit    { grid-area: unit; justify-self: end; }
.linkage-xy-row input[type="number"] {
  grid-area: input;
  background: var(--formula-bg); border: 1px solid var(--border); color: var(--text);
  border-radius: 4px; padding: 4px 8px; font-size: 14px; width: 100%; min-width: 0;
  font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
  text-align: right;
}
.linkage-xy-row input[type="number"]:focus {
  outline: none; border-color: var(--accent);
}
.linkage-unit { color: var(--text-dim); font-size: 11px; }
.linkage-guide {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 14px;
}
.linkage-guide summary { cursor: pointer; color: var(--accent); font-weight: 600; }
.linkage-guide ul { margin: 10px 0 4px 18px; color: var(--text-dim); font-size: 13px; line-height: 1.6; }
.linkage-mode-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
  padding: 10px 14px; margin: 10px 0 6px 0;
}
.linkage-mode-title { font-size: 12px; color: var(--text-dim); letter-spacing: 0.5px; margin-bottom: 6px; }
.linkage-mode-row { display: flex; gap: 8px; flex-wrap: wrap; }
.linkage-mode-btn {
  background: var(--formula-bg); color: var(--text-dim);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
}
.linkage-mode-btn:hover { color: var(--text); border-color: var(--accent); }
.linkage-mode-btn.active {
  background: rgba(78,161,255,0.15); color: var(--accent);
  border-color: var(--accent);
}
.linkage-mode-desc { color: var(--text-dim); font-size: 12px; margin-top: 8px; line-height: 1.5; }
.linkage-points-desc {
  color: var(--text-dim); font-size: 12px; margin: 2px 0 8px 0; line-height: 1.5;
}
.linkage-length-row label {
  display: grid; grid-template-columns: 1fr auto;
  grid-template-areas: "name unit" "input input";
  column-gap: 6px; row-gap: 4px; align-items: center;
  font-size: 12px; color: var(--text-dim); min-width: 0;
}
.linkage-length-row label > span:first-child { grid-area: name; }
.linkage-length-row label > .linkage-unit    { grid-area: unit; justify-self: end; }
.linkage-length-row input[type="number"] {
  grid-area: input;
  background: var(--formula-bg); border: 1px solid var(--border); color: var(--text);
  border-radius: 4px; padding: 4px 8px; font-size: 14px; width: 100%; min-width: 0;
  font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
  text-align: right;
}
.linkage-length-row input[type="number"]:focus {
  outline: none; border-color: var(--accent);
}
.linkage-anchor-tag {
  display: inline-block; margin-left: 8px;
  font-size: 10px; font-weight: 500; letter-spacing: 0.4px;
  color: var(--text-dim); border: 1px solid var(--border);
  border-radius: 3px; padding: 1px 6px;
}
</style>
</head>
<body>
<aside>
  <div class="lang-bar">
    <button class="lang-btn" data-lang="zh" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
  </div>
  <h2 data-ui="nav_channels">6 大核心通道</h2>
  <div id="nav-channels"></div>
  <h2 data-ui="nav_intermediate">中间量</h2>
  <div id="nav-intermediate"></div>
  <h2 data-ui="nav_inputs">输入参数</h2>
  <div id="nav-inputs"></div>
</aside>
<main>
  <div class="breadcrumbs" id="breadcrumbs"></div>
  <div id="content"></div>
</main>

<script type="module">
import { P, INPUT_META, CALC, D2R, R2D, defaultValues, computeAll } from './src/formulas.js';
import { renderDataTable, defaultBikes, PRESET_VALUES } from './src/data-table.js';
import { CATALOGS, CATALOG_KEYS, setCatalogEntry, patchCatalogEntry, removeCatalogEntry, getUserOverlay, applyUserOverlay, resetUserOverlay } from './src/catalog.js';
import { renderCatalogEditor } from './src/catalog-editor.js';

const DIAGRAMS = {};

// === Rake (静态/动态) ===
const _rake = () => {
  const b = BIKE, sh = b.steeringHead, fa = b.frontAxle;
  const a1 = Math.PI/2;
  const a2 = Math.atan2(fa.y - sh.y, fa.x - sh.x);
  return `
    <line x1="${sh.x}" y1="${sh.y}" x2="${sh.x}" y2="${sh.y+150}" stroke="${SC.hi}" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.7"/>
    <line x1="${sh.x}" y1="${sh.y}" x2="${fa.x}" y2="${fa.y}" stroke="${SC.hi}" stroke-width="3"/>
    <path d="${arcD(sh.x, sh.y, 55, a1, a2, 0, 0)}" fill="none" stroke="${SC.hi}" stroke-width="2"/>
    <text x="${sh.x+10}" y="${sh.y+72}" fill="${SC.hi}" font-size="17" font-style="italic" font-family="serif">θ</text>
    <text x="${sh.x-22}" y="${sh.y+165}" fill="${SC.hi}" font-size="11" opacity="0.85">Vertical</text>
    <text x="${(sh.x+fa.x)/2-30}" y="${(sh.y+fa.y)/2-8}" fill="${SC.hi}" font-size="11">Steering Axis</text>`;
};
DIAGRAMS.Rake_Static = _rake;
DIAGRAMS.MotoSPEC_Rake = _rake;

// === Trail (static) ===
DIAGRAMS.Trail_Static = () => {
  const b = BIKE, sh = b.steeringHead, fa = b.frontAxle;
  const dx = fa.x - sh.x, dy = fa.y - sh.y, len = Math.hypot(dx, dy);
  const ux = dx/len, uy = dy/len;
  const t = (b.groundY - sh.y) / uy;
  const gx = sh.x + ux * t;
  return `
    <line x1="${sh.x}" y1="${sh.y}" x2="${gx.toFixed(1)}" y2="${b.groundY}" stroke="${SC.hi}" stroke-width="2" stroke-dasharray="6,4" opacity="0.8"/>
    <line x1="${fa.x}" y1="${fa.y}" x2="${fa.x}" y2="${b.groundY}" stroke="${SC.hi}" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.5"/>
    <circle cx="${fa.x}" cy="${b.groundY}" r="3.5" fill="${SC.hi}"/>
    <circle cx="${gx.toFixed(1)}" cy="${b.groundY}" r="3.5" fill="${SC.hi}"/>
    <line x1="${fa.x}" y1="${b.groundY+18}" x2="${gx.toFixed(1)}" y2="${b.groundY+18}" stroke="${SC.hi}" stroke-width="2.5" marker-start="url(#ar-s)" marker-end="url(#ar)"/>
    <text x="${(fa.x+gx)/2-13}" y="${b.groundY+34}" fill="${SC.hi}" font-size="14" font-weight="bold">Trail</text>
    <text x="${fa.x-58}" y="${b.groundY-7}" fill="${SC.hi}" font-size="10" opacity="0.75">Contact pt</text>
    <text x="${gx-25}" y="${b.groundY-7}" fill="${SC.hi}" font-size="10" opacity="0.75">Axis · Ground</text>`;
};

// === theta_thrust ===
DIAGRAMS.theta_thrust = () => {
  const b = BIKE, sp = b.swingarmPivot, ra = b.rearAxle;
  const ct1 = { x: ra.x, y: ra.y - b.rearSprocketR };
  const ct2 = { x: sp.x, y: sp.y - b.frontSprocketR };
  const tanChain = Math.abs((ct1.y - ct2.y) / (ct1.x - ct2.x));
  const tanBeta = Math.abs((ra.y - sp.y) / Math.abs(sp.x - ra.x));
  const tanThrust = tanChain + tanBeta;
  const rc = { x: ra.x, y: b.groundY };
  const lineLen = 280;
  const thrustEnd = { x: rc.x + lineLen, y: rc.y - tanThrust * lineLen };
  return `
    <line x1="${ct1.x}" y1="${ct1.y}" x2="${ct2.x}" y2="${ct2.y}" stroke="${SC.hi3}" stroke-width="2" stroke-dasharray="5,3" opacity="0.85"/>
    <line x1="${sp.x}" y1="${sp.y}" x2="${ra.x}" y2="${ra.y}" stroke="${SC.hi3}" stroke-width="2" stroke-dasharray="5,3" opacity="0.85"/>
    <line x1="${rc.x}" y1="${rc.y}" x2="${thrustEnd.x.toFixed(1)}" y2="${thrustEnd.y.toFixed(1)}" stroke="${SC.hi3}" stroke-width="3"/>
    <line x1="${rc.x}" y1="${rc.y}" x2="${rc.x+lineLen}" y2="${rc.y}" stroke="${SC.hi3}" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
    <path d="${arcD(rc.x, rc.y, 70, 0, Math.atan2(thrustEnd.y - rc.y, thrustEnd.x - rc.x), 0, 0)}" fill="none" stroke="${SC.hi3}" stroke-width="2"/>
    <text x="${rc.x+78}" y="${rc.y-15}" fill="${SC.hi3}" font-size="13" font-style="italic" font-family="serif">θ_Thrust</text>
    <text x="${(ct1.x+ct2.x)/2-15}" y="${(ct1.y+ct2.y)/2-8}" fill="${SC.hi3}" font-size="10" opacity="0.85">Chain</text>
    <text x="${(sp.x+ra.x)/2-25}" y="${(sp.y+ra.y)/2+15}" fill="${SC.hi3}" font-size="10" opacity="0.85">Swingarm</text>
    <circle cx="${rc.x}" cy="${rc.y}" r="3.5" fill="${SC.hi3}"/>`;
};

DIAGRAMS.MotoSPEC_AntSquat = () => {

  const ct2 = { x: sp.x, y: sp.y - b.frontSprocketR };
  const tanChain = Math.abs((ct1.y - ct2.y) / (ct1.x - ct2.x));
  const tanBeta = Math.abs((ra.y - sp.y) / Math.abs(sp.x - ra.x));
  const tanThrust = tanChain + tanBeta;

  return `

    <line x1="${rc.x}" y1="${rc.y}" x2="${thrustEnd.x.toFixed(1)}" y2="${thrustEnd.y.toFixed(1)}" stroke="${SC.hi3}" stroke-width="2.5"/>
    <line x1="${rc.x}" y1="${rc.y}" x2="${rc.x+lineLen}" y2="${rc.y}" stroke="#888" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
    ${cgMarker(cg.x, cg.y)}

const STORAGE_KEY = 'motospec_state_v1';
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (s && s.values) {
      const merged = defaultValues();
      for (const k in s.values) if (k in merged) merged[k] = s.values[k];
      const bikes = (Array.isArray(s.bikes) && s.bikes.length === 3) ? s.bikes : defaultBikes();
      if (s.userCatalogs) applyUserOverlay(s.userCatalogs);
      const catalogTab = (typeof s.catalogTab === 'string' && CATALOG_KEYS.includes(s.catalogTab)) ? s.catalogTab : CATALOG_KEYS[0];

}
function saveState() {
  try {
    const payload = { ...state, userCatalogs: getUserOverlay() };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  } catch (e) {}
}

const state = loadState() || { values: defaultValues(), bikes: defaultBikes(), catalogTab: CATALOG_KEYS[0] };
if (!Array.isArray(state.bikes) || state.bikes.length !== 3) state.bikes = defaultBikes();
if (!state.catalogTab) state.catalogTab = CATALOG_KEYS[0];
let _all = computeAll(state.values);
function gv(id) { return _all[id]; }
function clearCache() { _all = computeAll(state.values); }

function fmtVal(id) {
  const p = P[id], v = gv(id);
  if (!isFinite(v)) return '—';
  if (p.unit === 'rad') return `${v.toFixed(4)} rad (${(v * R2D).toFixed(2)}°)`;
  const av = Math.abs(v);
  const dec = av >= 1000 ? 0 : av >= 100 ? 1 : av >= 10 ? 2 : 3;
  const u = p.unit === '—' ? '' : ` ${p.unit}`;
  return `${v.toFixed(dec)}${u}`;
}

const LINKAGE_FIXED_KEYS = new Set([
  'Frame_Rocker_Pivot_X', 'Frame_Rocker_Pivot_Y',
  'Drag_To_Swingarm_X',   'Drag_To_Swingarm_Y',
  'Frame_Shock_Top_X',    'Frame_Shock_Top_Y',
]);

function setInputValue(id, raw) {
  const m = INPUT_META[id];
  let n = parseFloat(raw);
  if (isNaN(n)) return;
  n = Math.max(m.min, Math.min(m.max, n));

  // Length mode: when a fixed anchor moves, hold the four rod lengths
  // constant and re-derive the rocker-triangle points to match.
  const inLengthMode = state.values.Linkage_Input_Style === 'length'
                    || state.values.Linkage_Input_Style === 'polar';
  let lengthsBefore = null;
  if (inLengthMode && LINKAGE_FIXED_KEYS.has(id)) {
    lengthsBefore = currentLengths(state.values);
  }

  state.values[id] = n;
  if (id === 'front_weight_dist') state.values.rear_weight_dist  = +(1 - n).toFixed(3);
  if (id === 'rear_weight_dist')  state.values.front_weight_dist = +(1 - n).toFixed(3);

  if (lengthsBefore) {
    const { rd, rs } = rebuildLinkageGeometry(state.values, lengthsBefore);
    if (rd) {
      state.values.Rocker_To_Drag_X  = clampMeta('Rocker_To_Drag_X',  rd.x);
      state.values.Rocker_To_Drag_Y  = clampMeta('Rocker_To_Drag_Y',  rd.y);
    }
    if (rs) {
      state.values.Rocker_To_Shock_X = clampMeta('Rocker_To_Shock_X', rs.x);
      state.values.Rocker_To_Shock_Y = clampMeta('Rocker_To_Shock_Y', rs.y);
    }
  }

  saveState();
  clearCache();
  syncControls(id);
  updateLiveValues();
  if (stack[stack.length - 1] === '__linkage') patchLinkageView();
}
function setLinkageInputStyle(style) {
  if (style !== 'cartesian' && style !== 'length') return;
  state.values.Linkage_Input_Style = style;
  saveState();
  renderContent(); // toggle re-renders all input cards
}
// Length-mode setter: user types a new length for one of the four
// rod/arm measurements. We hold the three fixed-point XY anchors and
// the other three lengths constant, then re-derive rocker_to_drag and
// rocker_to_shock by two-circle intersection (branch picked nearest the
// previous solution).
function setLinkageLength(lengthKey, raw) {
  const v = parseFloat(raw);
  if (!Number.isFinite(v) || v <= 0) return;
  const lengths = currentLengths(state.values);
  if (!Object.prototype.hasOwnProperty.call(lengths, lengthKey)) return;
  lengths[lengthKey] = v;
  const { rd, rs } = rebuildLinkageGeometry(state.values, lengths);
  if (rd) {
    state.values.Rocker_To_Drag_X  = clampMeta('Rocker_To_Drag_X',  rd.x);
    state.values.Rocker_To_Drag_Y  = clampMeta('Rocker_To_Drag_Y',  rd.y);
  }
  if (rs) {
    state.values.Rocker_To_Shock_X = clampMeta('Rocker_To_Shock_X', rs.x);
    state.values.Rocker_To_Shock_Y = clampMeta('Rocker_To_Shock_Y', rs.y);
  }
  saveState();
  clearCache();
  if (stack[stack.length - 1] === '__linkage') patchLinkageView();
}
function clampMeta(id, n) {
  const m = INPUT_META[id];
  if (!m) return n;
  return Math.max(m.min, Math.min(m.max, n));
}
function setLinkageMode(mode) {
  if (mode !== 'linked' && mode !== 'pro-link') return;
  const prev = state.values.Linkage_Mode === 'pro-link' ? 'pro-link' : 'linked';
  state.values.Linkage_Mode = mode;
  // If the user hasn't customised the coords (they still match the previous
  // mode's placeholder verbatim), swap them to the new mode's placeholder so
  // the diagram immediately reflects the geometry of that mode. Otherwise
  // we keep their measurements — they can hit Reset to overwrite manually.
  if (mode !== prev && matchesPlaceholder(state.values, prev)) {
    const p = placeholderForMode(mode);
    for (const [k, v] of Object.entries(p)) state.values[k] = v;
  }
  saveState();
  clearCache();
  renderContent();
}
function patchLinkageView() {
  const content = document.getElementById('content');
  if (!content) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = renderLinkageSetup({ values: state.values, lang });
  const swap = (sel) => {
    const next = tmp.querySelector(sel);
    const cur  = content.querySelector(sel);
    if (next && cur) cur.replaceWith(next);
  };
  swap('.linkage-svg');
  swap('.linkage-readout-strip');
  swap('.linkage-chart-wrap');
}
function setBikeInput(bikeIdx, key, raw) {
  const b = state.bikes[bikeIdx];
  if (!b) return;
  let n = parseFloat(raw);
  if (isNaN(n)) return;
  const m = INPUT_META[key];
  if (m) n = Math.max(m.min, Math.min(m.max, n));
  b.values[key] = n;
  if (key === 'front_weight_dist') b.values.rear_weight_dist  = +(1 - n).toFixed(3);
  if (key === 'rear_weight_dist')  b.values.front_weight_dist = +(1 - n).toFixed(3);
  if (['Travel_Front', 'Travel_Rear', 'Lean_Angle'].includes(key)) b.preset = 'custom';
  saveState();
  renderContent();
}
const COMPONENT_TO_CATALOG = {
  clamp: 'clamps', fork: 'forks', shock: 'shocks', swingarm: 'swingarms',
  linkage: 'linkages', front_tire: 'tires', rear_tire: 'tires',
};
function setCatalogTab(catalogKey) {
  if (!CATALOG_KEYS.includes(catalogKey)) return;
  state.catalogTab = catalogKey;
  saveState();
  renderContent();
}
function coerceCatalogValue(raw) {
  if (raw === '' || raw == null) return null;
  const n = Number(raw);
  return Number.isFinite(n) && raw.trim() !== '' ? n : raw;
}
function setCatalogField(catalogKey, id, fieldPath, raw) {
  const value = (fieldPath === 'name' || fieldPath === 'manufacturer') ? raw : coerceCatalogValue(raw);
  try { patchCatalogEntry(catalogKey, id, fieldPath, value); }

function addCatalogEntryUI(catalogKey) {
  const input = document.getElementById('cat-add-' + catalogKey);
  const id = (input?.value || '').trim();
  if (!id) { alert(lang === 'en' ? 'Enter an ID first' : '请先输入 ID'); return; }
  if (CATALOGS[catalogKey]?.[id]) { alert(lang === 'en' ? 'ID already exists' : 'ID 已存在'); return; }
  setCatalogEntry(catalogKey, id, { name: id, manufacturer: '', specs: {} });

}
function removeCatalogEntryUI(catalogKey, id) {
  const ok = confirm((lang === 'en' ? 'Remove ' : '删除 ') + catalogKey + '/' + id + '?');
  if (!ok) return;
  removeCatalogEntry(catalogKey, id);

}
function exportCatalogs() {
  const json = JSON.stringify(getUserOverlay(), null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'motospec-catalogs.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function importCatalogs() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'application/json,.json';
  input.onchange = async () => {
    const f = input.files?.[0]; if (!f) return;
    try {
      const txt = await f.text();
      const parsed = JSON.parse(txt);
      applyUserOverlay(parsed);
      saveState();
      renderContent();
    } catch (e) { alert((lang === 'en' ? 'Import failed: ' : '导入失败：') + e.message); }
  };
  input.click();
}
function resetCatalogs() {
  const ok = confirm(lang === 'en' ? 'Reset all catalog edits to baseline?' : '清除所有部件库编辑，恢复出厂数据？');
  if (!ok) return;
  resetUserOverlay();
  saveState();
  renderContent();
}
function setBikeComponent(bikeIdx, componentKey, id) {
  const b = state.bikes[bikeIdx];
  if (!b) return;
  const catalog = CATALOGS[COMPONENT_TO_CATALOG[componentKey]];
  if (!catalog) return;
  const entry = catalog[id];
  if (!entry) return;
  b.components = b.components || {};
  b.components[componentKey] = id;
  if (entry.specs) Object.assign(b.values, entry.specs);
  saveState();
  renderContent();
}
function setBikeName(bikeIdx, value) {
  const b = state.bikes[bikeIdx];
  if (!b) return;
  b.name = value;
  saveState();
  renderContent();
}
function applyBikePreset(bikeIdx, presetName) {
  const b = state.bikes[bikeIdx];
  if (!b) return;
  if (presetName === 'custom') { b.preset = 'custom'; saveState(); return; }
  const vals = PRESET_VALUES[presetName];
  if (!vals) return;
  Object.assign(b.values, vals);
  b.preset = presetName;
  saveState();
  renderContent();
}

function syncControls(id) {
  document.querySelectorAll(`[data-input="${id}"]`).forEach(el => {
    if (document.activeElement !== el) el.value = state.values[id];
  });
  if (id === 'front_weight_dist' || id === 'rear_weight_dist') {
    const other = id === 'front_weight_dist' ? 'rear_weight_dist' : 'front_weight_dist';
    document.querySelectorAll(`[data-input="${other}"]`).forEach(el => { el.value = state.values[other]; });
  }
}
function updateLiveValues() {
  document.querySelectorAll('[data-live]').forEach(el => {
    el.textContent = fmtVal(el.getAttribute('data-live'));
  });
}

  Object.assign(state.values, PRESET_LIST[idx].vals);
  saveState(); clearCache(); render();
}

  state.values = defaultValues();
  saveState(); clearCache(); render();
}
function resetLinkagePlaceholder() {
  const mode = state.values.Linkage_Mode === 'pro-link' ? 'pro-link' : 'linked';
  for (const [k, v] of Object.entries(placeholderForMode(mode))) {
    state.values[k] = v;
  }

// ============================================================
// 状态：当前路径（面包屑）
// ============================================================
let stack = ['__dashboard'];

function typeLabel(t) {
  return ({channel: T('type_channel'), intermediate: T('type_intermediate'), input: T('type_input')})[t] || t;
}

function navigateTo(id) {
  if (id !== '__dashboard' && id !== '__datatable' && id !== '__linkage' && id !== '__catalogs' && !P[id]) return;
  if (stack[stack.length - 1] === id) return;
  const idx = stack.indexOf(id);
  if (idx >= 0) stack = stack.slice(0, idx + 1);
  else stack.push(id);
  render();
}

function navigateRoot(id) {
  if (id !== '__dashboard' && id !== '__datatable' && id !== '__linkage' && id !== '__catalogs' && !P[id]) return;
  stack = [id];
  render();
}

function render() {
  clearCache();
  applyUIChrome();
  renderNav();
  renderBreadcrumbs();
  renderContent();
}

function applyUIChrome() {
  document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
  document.querySelectorAll('[data-ui]').forEach(el => {
    el.textContent = T(el.getAttribute('data-ui'));
  });
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('data-lang') === lang);
  });
}

function renderNav() {
  const channels = Object.keys(P).filter(k => P[k].type === 'channel');
  const intermediates = Object.keys(P).filter(k => P[k].type === 'intermediate');
  const inputs = Object.keys(P).filter(k => P[k].type === 'input');
  const current = stack[stack.length - 1];
  const dashHTML = `<div class="nav-item dashboard ${current === '__dashboard' ? 'active' : ''}" onclick="navigateRoot('__dashboard')">
    <strong>${escapeHtml(T('dashboard_nav'))}</strong><span class="label">${escapeHtml(T('dashboard_sub'))}</span>
  </div>
  <div class="nav-item dashboard ${current === '__datatable' ? 'active' : ''}" onclick="navigateRoot('__datatable')">
    <strong>${escapeHtml(T('datatable_nav'))}</strong><span class="label">${escapeHtml(T('datatable_sub'))}</span>
  </div>
  <div class="nav-item dashboard ${current === '__linkage' ? 'active' : ''}" onclick="navigateRoot('__linkage')">
    <strong>${escapeHtml(T('linkage_nav'))}</strong><span class="label">${escapeHtml(T('linkage_sub'))}</span>
  </div>
  <div class="nav-item dashboard ${current === '__catalogs' ? 'active' : ''}" onclick="navigateRoot('__catalogs')">
    <strong>${escapeHtml(lang === 'en' ? 'Component Library' : '部件库')}</strong><span class="label">${escapeHtml(lang === 'en' ? 'Forks · Shocks · Linkages …' : '前叉 · 避震 · 连杆 …')}</span>
  </div>`;
  const make = (ids) => ids.map(id => {
    const p = P[id];
    return `<div class="nav-item ${id === current ? 'active' : ''}" onclick="navigateRoot('${id}')">
      <strong>${escapeHtml(p.name)}</strong><span class="label">${escapeHtml(tr(id,'label'))}</span>
    </div>`;
  }).join('');
  document.getElementById('nav-channels').innerHTML = dashHTML + make(channels);
  document.getElementById('nav-intermediate').innerHTML = make(intermediates);
  document.getElementById('nav-inputs').innerHTML = make(inputs);
}

function renderBreadcrumbs() {
  const el = document.getElementById('breadcrumbs');
  el.innerHTML = stack.map((id, i) => {
    const isLast = i === stack.length - 1;
    const cls = isLast ? 'crumb current' : 'crumb';
    const onClick = isLast ? '' : `onclick="navigateTo('${id}')"`;
    const label = id === '__dashboard' ? T('dashboard_nav')
                : id === '__datatable' ? T('datatable_nav')
                : id === '__linkage' ? T('linkage_nav')
                : id === '__catalogs' ? (lang === 'en' ? 'Component Library' : '部件库')
                : P[id].name;
    return `<span class="${cls}" ${onClick}>${escapeHtml(label)}</span>` +
      (isLast ? '' : '<span class="sep">›</span>');
  }).join('');
}

function renderDashboard() {
  let html = `<div class="header">
    <h1>${escapeHtml(T('dashboard_title'))}</h1>
    <span class="label-zh">${escapeHtml(T('dashboard_kicker'))}</span>
  </div>`;
  html += `<div class="desc">${escapeHtml(T('dashboard_desc'))}</div>`;

  html += `<div class="section-title">${escapeHtml(T('presets'))}</div>`;
  html += `<div class="preset-bar">`;
  PRESET_LIST.forEach((preset, i) => {
    html += `<button class="preset-btn" onclick="applyPreset(${i})">${escapeHtml(presetName(i))}</button>`;
  });
  html += `<button class="preset-btn reset" onclick="resetDefaults()">${escapeHtml(T('reset'))}</button>`;
  html += `</div>`;

  html += `<div class="section-title">${escapeHtml(T('main_channels'))}</div>`;
  html += `<div class="dash-grid">`;
  Object.keys(P).filter(k => P[k].type === 'channel').forEach(id => {
    const p = P[id];
    html += `<div class="dash-card" onclick="navigateRoot('${id}')">

  html += `<div class="section-title" style="margin-top:24px">${escapeHtml(T('intermediates'))}</div>`;

function renderContent() {
  const id = stack[stack.length - 1];
  if (id === '__dashboard') return renderDashboard();
  if (id === '__datatable') {
    document.getElementById('content').innerHTML = renderDataTable({ values: state.values, bikes: state.bikes, lang });

  }
  if (id === '__linkage') {

function renderFormula(formula) {
  return formula.map(seg => {
    if (typeof seg === 'string') return escapeHtml(seg);
    if (seg.ref && P[seg.ref]) {
      const p = P[seg.ref];
      return `<span class="param-chip ${p.type}" onclick="navigateTo('${seg.ref}')" title="${escapeHtml(tr(seg.ref,'label'))}${escapeHtml(T('drill_hint'))}">${escapeHtml(p.name)}</span>`;
    }
    return '';
  }).join('');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
