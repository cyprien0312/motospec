<svg viewBox="0 0 1000 780" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, 'PingFang SC', 'Noto Sans CJK SC', sans-serif">
  <!-- ============================================================
       3D scan point map — side-view projection, nose LEFT.
       Geometry: schematic 765 at scale 0.45 px/mm, reference state
       (suspension fully extended). Linkage cluster uses the real
       MotoSPEC-fit coordinates relative to the swingarm pivot.
       ============================================================ -->
  <rect width="1000" height="780" fill="#0d1117"/>

  <text x="30" y="34" fill="#e6edf3" font-size="20" font-weight="700">3D 扫描取点图 — 侧视投影（车头朝左）</text>
  <text x="30" y="56" fill="#8b949e" font-size="13">所有点取孔心 / 轴承中心；左右两侧各贴标记取中点 → 投影到中央纵平面（2D）。</text>
  <text x="30" y="76" fill="#8b949e" font-size="13">扫描状态：悬挂完全伸展、整车竖直、前轮正直、含地面。</text>

  <!-- ==================== ground ==================== -->
  <line x1="40" y1="470" x2="960" y2="470" stroke="#30363d" stroke-width="2"/>
  <g stroke="#21262d" stroke-width="1.5">
    <line x1="60"  y1="470" x2="48"  y2="482"/><line x1="100" y1="470" x2="88"  y2="482"/>
    <line x1="140" y1="470" x2="128" y2="482"/><line x1="380" y1="470" x2="368" y2="482"/>
    <line x1="420" y1="470" x2="408" y2="482"/><line x1="460" y1="470" x2="448" y2="482"/>
    <line x1="500" y1="470" x2="488" y2="482"/><line x1="540" y1="470" x2="528" y2="482"/>
    <line x1="880" y1="470" x2="868" y2="482"/><line x1="920" y1="470" x2="908" y2="482"/>
  </g>
  <text x="470" y="463" fill="#8b949e" font-size="12" text-anchor="middle">GND 地面平面（扫描必须包含）</text>

  <!-- ==================== wheels ==================== -->
  <circle cx="180" cy="333" r="137" fill="none" stroke="#30363d" stroke-width="7"/>
  <circle cx="180" cy="333" r="76"  fill="none" stroke="#21262d" stroke-width="2"/>
  <circle cx="817" cy="325" r="145" fill="none" stroke="#30363d" stroke-width="7"/>
  <circle cx="817" cy="325" r="80"  fill="none" stroke="#21262d" stroke-width="2"/>

  <!-- ==================== fork + steering axis ==================== -->
  <line x1="180" y1="333" x2="272" y2="122" stroke="#8b949e" stroke-width="5" opacity="0.85"/>
  <line x1="231" y1="246" x2="296" y2="100" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="6 4"/>
  <!-- triple clamps (fork tube -> axis) -->
  <line x1="240" y1="196" x2="251" y2="201" stroke="#8b949e" stroke-width="4"/>
  <line x1="266" y1="136" x2="277" y2="141" stroke="#8b949e" stroke-width="4"/>
  <!-- rake angle: vertical ref at SA-L -->
  <line x1="251" y1="201" x2="251" y2="118" stroke="#484f58" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M 251 138 A 63 63 0 0 1 277 144" fill="none" stroke="#f0883e" stroke-width="1.2"/>
  <text x="262" y="130" fill="#f0883e" font-size="12">rake</text>

  <!-- ==================== frame ==================== -->
  <polyline points="277,141 450,175 610,181" fill="none" stroke="#8b949e" stroke-width="5" opacity="0.85"/>
  <polyline points="610,181 556,268" fill="none" stroke="#8b949e" stroke-width="5" opacity="0.85"/>
  <polyline points="290,158 527,260" fill="none" stroke="#8b949e" stroke-width="3.5" opacity="0.6"/>
  <line x1="527" y1="260" x2="556" y2="268" stroke="#8b949e" stroke-width="3.5" opacity="0.6"/>

  <!-- chain run (for anti-squat) -->
  <line x1="527" y1="260" x2="817" y2="325" stroke="#484f58" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ==================== swingarm ==================== -->
  <line x1="556" y1="268" x2="817" y2="325" stroke="#58a6ff" stroke-width="5" opacity="0.9"/>
  <!-- beta angle at rear axle: horizontal ref -->
  <line x1="817" y1="325" x2="705" y2="325" stroke="#484f58" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M 730 325 A 87 87 0 0 1 732 306" fill="none" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="700" y="313" fill="#58a6ff" font-size="12">β</text>

  <!-- ==================== linkage (real fit coords, scaled) ==================== -->
  <!-- rocker triangle ③④⑤ -->
  <polygon points="660,295 627,307 652,314" fill="rgba(247,129,102,0.25)" stroke="#f78166" stroke-width="2"/>
  <!-- dogbone ⑤-⑥ -->
  <line x1="652" y1="314" x2="578" y2="298" stroke="#d2a8ff" stroke-width="3"/>
  <!-- shock ⑦-④ -->
  <line x1="610" y1="181" x2="627" y2="307" stroke="#7ee787" stroke-width="6" opacity="0.85"/>
  <line x1="610" y1="181" x2="627" y2="307" stroke="#0d1117" stroke-width="2"/>

  <!-- cluster zoom source box -->
  <rect x="545" y="250" width="155" height="85" rx="6" fill="none" stroke="#484f58" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="700" y1="250" x2="712" y2="196" stroke="#484f58" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- ==================== dimension helpers ==================== -->
  <line x1="180" y1="333" x2="180" y2="498" stroke="#484f58" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="817" y1="325" x2="817" y2="498" stroke="#484f58" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="180" y1="492" x2="817" y2="492" stroke="#8b949e" stroke-width="1"/>
  <path d="M 180 492 l 9 -4 v 8 z" fill="#8b949e"/>
  <path d="M 817 492 l -9 -4 v 8 z" fill="#8b949e"/>
  <text x="470" y="510" fill="#8b949e" font-size="12" text-anchor="middle">WB = FA ↔ RA 水平距</text>
  <text x="168" y="412" fill="#8b949e" font-size="12" text-anchor="end">Rf = FA 离地高</text>

  <!-- ==================== points ==================== -->
  <!-- chassis-level (white) -->
  <g>
    <circle cx="180" cy="333" r="6" fill="#0d1117" stroke="#e6edf3" stroke-width="2"/><circle cx="180" cy="333" r="2.2" fill="#e6edf3"/>
    <text x="150" y="322" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="end">FA 前轴心</text>

    <circle cx="817" cy="325" r="6" fill="#0d1117" stroke="#e6edf3" stroke-width="2"/><circle cx="817" cy="325" r="2.2" fill="#e6edf3"/>
    <text x="848" y="318" fill="#e6edf3" font-size="13" font-weight="600">RA 后轴心 ②</text>

    <circle cx="556" cy="268" r="6" fill="#0d1117" stroke="#e6edf3" stroke-width="2"/><circle cx="556" cy="268" r="2.2" fill="#e6edf3"/>
    <text x="548" y="242" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="end">SP 摇臂枢轴 ①</text>

    <circle cx="527" cy="260" r="5" fill="#0d1117" stroke="#e6edf3" stroke-width="1.6"/><circle cx="527" cy="260" r="1.8" fill="#e6edf3"/>
    <line x1="522" y1="256" x2="470" y2="232" stroke="#484f58" stroke-width="1"/>
    <text x="466" y="228" fill="#e6edf3" font-size="12.5" text-anchor="end">CS 前链轮轴心</text>

    <circle cx="251" cy="201" r="5.5" fill="#0d1117" stroke="#f0883e" stroke-width="2"/><circle cx="251" cy="201" r="2" fill="#f0883e"/>
    <line x1="245" y1="204" x2="196" y2="222" stroke="#484f58" stroke-width="1"/>
    <text x="192" y="228" fill="#f0883e" font-size="12.5" text-anchor="end">SA-L 转向轴下轴承</text>

    <circle cx="277" cy="141" r="5.5" fill="#0d1117" stroke="#f0883e" stroke-width="2"/><circle cx="277" cy="141" r="2" fill="#f0883e"/>
    <line x1="271" y1="137" x2="214" y2="112" stroke="#484f58" stroke-width="1"/>
    <text x="210" y="108" fill="#f0883e" font-size="12.5" text-anchor="end">SA-U 转向轴上轴承</text>

    <circle cx="180" cy="470" r="4.5" fill="#0d1117" stroke="#8b949e" stroke-width="1.6"/><circle cx="180" cy="470" r="1.6" fill="#8b949e"/>
    <text x="180" y="452" fill="#8b949e" font-size="12" text-anchor="middle">GND-F</text>
    <circle cx="817" cy="470" r="4.5" fill="#0d1117" stroke="#8b949e" stroke-width="1.6"/><circle cx="817" cy="470" r="1.6" fill="#8b949e"/>
    <text x="817" y="452" fill="#8b949e" font-size="12" text-anchor="middle">GND-R</text>
  </g>

  <!-- linkage-level points in main view (small; see inset) -->
  <g>
    <circle cx="610" cy="181" r="6" fill="#0d1117" stroke="#7ee787" stroke-width="2"/><circle cx="610" cy="181" r="2.2" fill="#7ee787"/>
    <text x="598" y="166" fill="#7ee787" font-size="13" font-weight="600" text-anchor="end">⑦ 车架避震上端</text>
    <circle cx="660" cy="295" r="4" fill="#f78166"/>
    <circle cx="627" cy="307" r="4" fill="#f78166"/>
    <circle cx="652" cy="314" r="4" fill="#f78166"/>
    <circle cx="578" cy="298" r="4" fill="#d2a8ff"/>
  </g>

  <!-- ==================== zoom inset ==================== -->
  <g>
    <rect x="710" y="40" width="264" height="150" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="965" y="60" fill="#8b949e" font-size="12" text-anchor="end">连杆放大 ×1.7</text>
    <!-- swingarm through inset -->
    <line x1="728.7" y1="70.6" x2="965" y2="122.5" stroke="#58a6ff" stroke-width="4" opacity="0.9"/>
    <!-- rocker triangle -->
    <polygon points="905.5,116.5 849.4,136.9 891.9,148.8" fill="rgba(247,129,102,0.25)" stroke="#f78166" stroke-width="2"/>
    <!-- dogbone -->
    <line x1="891.9" y1="148.8" x2="766.1" y2="121.6" stroke="#d2a8ff" stroke-width="3"/>
    <!-- shock heading up to ⑦ (clipped) -->
    <line x1="849.4" y1="136.9" x2="836" y2="63" stroke="#7ee787" stroke-width="5" opacity="0.85"/>
    <text x="828" y="56" fill="#7ee787" font-size="11">→ ⑦</text>
    <!-- points + labels -->
    <circle cx="728.7" cy="70.6" r="5" fill="#0d1117" stroke="#e6edf3" stroke-width="2"/><circle cx="728.7" cy="70.6" r="1.8" fill="#e6edf3"/>
    <text x="737" y="68" fill="#e6edf3" font-size="12" font-weight="600">① SP</text>
    <circle cx="905.5" cy="116.5" r="5" fill="#0d1117" stroke="#f78166" stroke-width="2"/><circle cx="905.5" cy="116.5" r="1.8" fill="#f78166"/>
    <text x="915" y="112" fill="#f78166" font-size="12" font-weight="600">③</text>
    <circle cx="849.4" cy="136.9" r="5" fill="#0d1117" stroke="#f78166" stroke-width="2"/><circle cx="849.4" cy="136.9" r="1.8" fill="#f78166"/>
    <text x="833" y="153" fill="#f78166" font-size="12" font-weight="600">④</text>
    <circle cx="891.9" cy="148.8" r="5" fill="#0d1117" stroke="#f78166" stroke-width="2"/><circle cx="891.9" cy="148.8" r="1.8" fill="#f78166"/>
    <text x="898" y="164" fill="#f78166" font-size="12" font-weight="600">⑤</text>
    <circle cx="766.1" cy="121.6" r="5" fill="#0d1117" stroke="#d2a8ff" stroke-width="2"/><circle cx="766.1" cy="121.6" r="1.8" fill="#d2a8ff"/>
    <text x="748" y="140" fill="#d2a8ff" font-size="12" font-weight="600">⑥</text>
    <text x="722" y="180" fill="#8b949e" font-size="10.5">③在摇臂上 ④⑤在rocker上 ⑥⑦在车架上</text>
  </g>

  <!-- ==================== legend panel ==================== -->
  <line x1="30" y1="545" x2="970" y2="545" stroke="#21262d" stroke-width="1"/>

  <g font-size="12.5">
    <text x="40" y="572" fill="#e6edf3" font-size="14" font-weight="700">车架级取点</text>
    <text x="40" y="596" fill="#c9d1d9">FA / RA　前后轴心</text>
    <text x="40" y="616" fill="#c9d1d9">SP　摇臂枢轴（=①）</text>
    <text x="40" y="636" fill="#c9d1d9">CS　前链轮轴心</text>
    <text x="40" y="656" fill="#c9d1d9">SA-U / SA-L　转向轴上下轴承中心</text>
    <text x="40" y="676" fill="#c9d1d9">GND　地面平面本身</text>
    <text x="40" y="700" fill="#8b949e">RA=② 与 SP=① 即连杆编号的前两位</text>

    <text x="330" y="572" fill="#e6edf3" font-size="14" font-weight="700">连杆级取点</text>
    <text x="330" y="596" fill="#f78166">③　摇臂上的 rocker 枢轴</text>
    <text x="330" y="616" fill="#f78166">④　rocker → 避震眼</text>
    <text x="330" y="636" fill="#f78166">⑤　rocker → 拉杆眼</text>
    <text x="330" y="656" fill="#d2a8ff">⑥　拉杆车架锚点</text>
    <text x="330" y="676" fill="#7ee787">⑦　车架避震上端</text>
    <text x="330" y="700" fill="#8b949e">杆长(③④⑤⑥间距)由坐标自动得出</text>

    <text x="580" y="572" fill="#e6edf3" font-size="14" font-weight="700">扫描要求</text>
    <text x="580" y="596" fill="#c9d1d9">悬挂完全伸展（前后 0 压缩）</text>
    <text x="580" y="616" fill="#c9d1d9">整车竖直、前轮正直、含地面</text>
    <text x="580" y="636" fill="#c9d1d9">每孔左右两侧贴标记 → 取中点</text>
    <text x="580" y="656" fill="#c9d1d9">一次扫描 = 单一刚体状态</text>
    <text x="580" y="676" fill="#c9d1d9">投影 = 丢弃横向坐标到中央纵平面</text>
    <text x="580" y="700" fill="#8b949e">质量 / CG 扫不出来 → 仍需称重</text>

    <text x="810" y="572" fill="#e6edf3" font-size="14" font-weight="700">由坐标直接导出</text>
    <text x="810" y="596" fill="#c9d1d9">rake = SA-U↔SA-L 倾角</text>
    <text x="810" y="616" fill="#c9d1d9">WB = FA↔RA 水平距</text>
    <text x="810" y="636" fill="#c9d1d9">Rf = FA 离地高</text>
    <text x="810" y="656" fill="#c9d1d9">β = SP↔RA 与地面夹角</text>
    <text x="810" y="676" fill="#c9d1d9">offset = FA 到转向轴垂距</text>
    <text x="810" y="700" fill="#8b949e">连杆坐标即扫即得，免距离法</text>
  </g>

  <text x="40" y="742" fill="#8b949e" font-size="12">坐标系：原点 = SP（摇臂枢轴），+X 向前（图左），+Y 向上，单位 mm —— 与 app 的 Linkage Setup 页一致；车架级表（origin=RA）见 measurement-points.md。</text>
  <text x="40" y="762" fill="#484f58" font-size="11">MotoSPEC Formula Explorer — docs/scan-points-zh.svg（示意几何按 765 参考态绘制，连杆簇为真实拟合坐标）</text>
</svg>
