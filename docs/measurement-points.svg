<svg viewBox="0 0 1200 640" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#29d3e0"/>
    </marker>
  </defs>

  <rect width="1200" height="640" fill="#0e1216"/>

  <!-- title -->
  <text x="40" y="46" fill="#e8edf2" font-size="24" font-weight="700" letter-spacing="2">FRAME MEASUREMENT POINTS</text>
  <text x="40" y="70" fill="#8a97a3" font-size="13">MotoSpec &#183; side view &#183; origin at rear axle (RA) &#183; +X forward, +Z up &#183; all dimensions in mm</text>

  <!-- ground line with hatching -->
  <line x1="60" y1="500" x2="900" y2="500" stroke="#5a6672" stroke-width="2"/>
  <g stroke="#39434d" stroke-width="1.5">
    <line x1="80" y1="512" x2="92" y2="500"/><line x1="120" y1="512" x2="132" y2="500"/>
    <line x1="160" y1="512" x2="172" y2="500"/><line x1="200" y1="512" x2="212" y2="500"/>
    <line x1="240" y1="512" x2="252" y2="500"/><line x1="280" y1="512" x2="292" y2="500"/>
    <line x1="320" y1="512" x2="332" y2="500"/><line x1="360" y1="512" x2="372" y2="500"/>
    <line x1="400" y1="512" x2="412" y2="500"/><line x1="440" y1="512" x2="452" y2="500"/>
    <line x1="480" y1="512" x2="492" y2="500"/><line x1="520" y1="512" x2="532" y2="500"/>
    <line x1="560" y1="512" x2="572" y2="500"/><line x1="600" y1="512" x2="612" y2="500"/>
    <line x1="640" y1="512" x2="652" y2="500"/><line x1="680" y1="512" x2="692" y2="500"/>
    <line x1="720" y1="512" x2="732" y2="500"/><line x1="760" y1="512" x2="772" y2="500"/>
    <line x1="800" y1="512" x2="812" y2="500"/><line x1="840" y1="512" x2="852" y2="500"/>
  </g>

  <!-- wheels -->
  <circle cx="250" cy="380" r="120" fill="none" stroke="#d7dde3" stroke-width="2.5"/>
  <circle cx="250" cy="380" r="70" fill="none" stroke="#4a5560" stroke-width="1.5"/>
  <circle cx="765" cy="380" r="120" fill="none" stroke="#d7dde3" stroke-width="2.5"/>
  <circle cx="765" cy="380" r="70" fill="none" stroke="#4a5560" stroke-width="1.5"/>

  <!-- rear sprocket + countershaft + chain top run -->
  <circle cx="250" cy="380" r="42" fill="none" stroke="#4a5560" stroke-width="1.5"/>
  <circle cx="400" cy="318" r="13" fill="none" stroke="#4a5560" stroke-width="1.5"/>
  <line x1="400" y1="305" x2="250" y2="338" stroke="#7a8794" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- swingarm: pivot -> rear axle -->
  <line x1="345" y1="338" x2="250" y2="380" stroke="#d7dde3" stroke-width="3.5"/>

  <!-- frame silhouette (schematic) -->
  <path d="M 672,205 L 560,240 L 420,290 L 345,338" fill="none" stroke="#3d4854" stroke-width="6" stroke-linecap="round"/>
  <rect x="390" y="330" width="140" height="100" rx="10" fill="none" stroke="#3d4854" stroke-width="2"/>
  <path d="M 555,245 L 430,235 L 330,250" fill="none" stroke="#3d4854" stroke-width="3" stroke-linecap="round"/>

  <!-- steering axis (construction line, extended to ground) -->
  <line x1="637" y1="120" x2="810" y2="500" stroke="#29d3e0" stroke-width="1.5" stroke-dasharray="7 5"/>
  <!-- vertical reference for rake -->
  <line x1="680" y1="150" x2="680" y2="330" stroke="#5a6672" stroke-width="1" stroke-dasharray="3 4"/>
  <path d="M 680,262 A 45 45 0 0 1 668,247" fill="none" stroke="#8a97a3" stroke-width="1.2"/>
  <text x="640" y="282" fill="#8a97a3" font-size="11">rake</text>
  <text x="612" y="295" fill="#5a6672" font-size="10">(from vertical)</text>

  <!-- fork -->
  <line x1="698" y1="225" x2="763" y2="378" stroke="#d7dde3" stroke-width="5" opacity="0.9"/>

  <!-- trail brace at ground -->
  <line x1="765" y1="518" x2="810" y2="518" stroke="#8a97a3" stroke-width="1.2"/>
  <line x1="765" y1="512" x2="765" y2="524" stroke="#8a97a3" stroke-width="1.2"/>
  <line x1="810" y1="512" x2="810" y2="524" stroke="#8a97a3" stroke-width="1.2"/>
  <text x="822" y="522" fill="#8a97a3" font-size="11">trail (check)</text>

  <!-- coordinate axes at RA -->
  <line x1="250" y1="380" x2="322" y2="380" stroke="#29d3e0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="250" y1="380" x2="250" y2="308" stroke="#29d3e0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="328" y="373" fill="#29d3e0" font-size="13" font-weight="600" font-family="ui-monospace, Menlo, monospace">+X</text>
  <text x="257" y="310" fill="#29d3e0" font-size="13" font-weight="600" font-family="ui-monospace, Menlo, monospace">+Z</text>

  <!-- wheelbase dimension -->
  <line x1="250" y1="560" x2="765" y2="560" stroke="#5a6672" stroke-width="1.2"/>
  <line x1="250" y1="552" x2="250" y2="568" stroke="#5a6672" stroke-width="1.2"/>
  <line x1="765" y1="552" x2="765" y2="568" stroke="#5a6672" stroke-width="1.2"/>
  <text x="507" y="554" fill="#8a97a3" font-size="12" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">wheelbaseMm = x_FA</text>

  <!-- ============ measurement point markers ============ -->
  <g stroke="#ff7a1a" stroke-width="2" fill="none">
    <!-- RA (origin) -->
    <circle cx="250" cy="380" r="8"/><line x1="238" y1="380" x2="262" y2="380"/><line x1="250" y1="368" x2="250" y2="392"/>
    <!-- FA -->
    <circle cx="765" cy="380" r="8"/><line x1="753" y1="380" x2="777" y2="380"/><line x1="765" y1="368" x2="765" y2="392"/>
    <!-- SP -->
    <circle cx="345" cy="338" r="8"/><line x1="333" y1="338" x2="357" y2="338"/><line x1="345" y1="326" x2="345" y2="350"/>
    <!-- CS -->
    <circle cx="400" cy="318" r="8"/><line x1="388" y1="318" x2="412" y2="318"/><line x1="400" y1="306" x2="400" y2="330"/>
    <!-- SA-U -->
    <circle cx="650" cy="150" r="8"/><line x1="638" y1="150" x2="662" y2="150"/><line x1="650" y1="138" x2="650" y2="162"/>
    <!-- SA-L -->
    <circle cx="680" cy="220" r="8"/><line x1="668" y1="220" x2="692" y2="220"/><line x1="680" y1="208" x2="680" y2="232"/>
    <!-- GND-R -->
    <circle cx="250" cy="500" r="8"/><line x1="238" y1="500" x2="262" y2="500"/><line x1="250" y1="488" x2="250" y2="512"/>
    <!-- GND-F -->
    <circle cx="765" cy="500" r="8"/><line x1="753" y1="500" x2="777" y2="500"/><line x1="765" y1="488" x2="765" y2="512"/>
  </g>

  <!-- labels + leader lines -->
  <g stroke="#ff7a1a" stroke-width="1" opacity="0.7">
    <line x1="243" y1="374" x2="196" y2="352"/>
    <line x1="772" y1="373" x2="848" y2="350"/>
    <line x1="341" y1="331" x2="322" y2="305"/>
    <line x1="406" y1="311" x2="428" y2="292"/>
    <line x1="642" y1="147" x2="592" y2="140"/>
    <line x1="672" y1="217" x2="620" y2="205"/>
    <line x1="243" y1="505" x2="205" y2="528"/>
    <line x1="772" y1="505" x2="815" y2="480"/>
  </g>
  <g fill="#ff7a1a" font-size="15" font-weight="700" font-family="ui-monospace, Menlo, monospace">
    <text x="160" y="350">RA</text>
    <text x="853" y="348">FA</text>
    <text x="303" y="299">SP</text>
    <text x="431" y="288">CS</text>
    <text x="537" y="144">SA-U</text>
    <text x="565" y="208">SA-L</text>
    <text x="146" y="534">GND-R</text>
    <text x="820" y="476">GND-F</text>
  </g>
  <text x="160" y="366" fill="#8a97a3" font-size="10.5">origin (0,0)</text>

  <!-- ============ legend ============ -->
  <g>
    <line x1="915" y1="100" x2="915" y2="560" stroke="#2a333c" stroke-width="1"/>
    <text x="940" y="118" fill="#e8edf2" font-size="14" font-weight="700" letter-spacing="2">POINTS</text>

    <g font-size="12.5">
      <text x="940" y="148" fill="#ff7a1a" font-weight="700" font-family="ui-monospace, Menlo, monospace">RA</text>
      <text x="1000" y="148" fill="#aeb9c4">Rear axle center &#8212; origin</text>
      <text x="940" y="176" fill="#ff7a1a" font-weight="700" font-family="ui-monospace, Menlo, monospace">FA</text>
      <text x="1000" y="176" fill="#aeb9c4">Front axle center</text>
      <text x="940" y="204" fill="#ff7a1a" font-weight="700" font-family="ui-monospace, Menlo, monospace">SP</text>
      <text x="1000" y="204" fill="#aeb9c4">Swingarm pivot center</text>
      <text x="940" y="232" fill="#ff7a1a" font-weight="700" font-family="ui-monospace, Menlo, monospace">CS</text>
      <text x="1000" y="232" fill="#aeb9c4">Countershaft sprocket center</text>
      <text x="940" y="260" fill="#ff7a1a" font-weight="700" font-family="ui-monospace, Menlo, monospace">SA-U</text>
      <text x="1000" y="260" fill="#aeb9c4">Steering axis, upper bearing</text>
      <text x="940" y="288" fill="#ff7a1a" font-weight="700" font-family="ui-monospace, Menlo, monospace">SA-L</text>
      <text x="1000" y="288" fill="#aeb9c4">Steering axis, lower bearing</text>
      <text x="940" y="316" fill="#ff7a1a" font-weight="700" font-family="ui-monospace, Menlo, monospace">GND-F</text>
      <text x="1000" y="316" fill="#aeb9c4">Front tire contact patch</text>
      <text x="940" y="344" fill="#ff7a1a" font-weight="700" font-family="ui-monospace, Menlo, monospace">GND-R</text>
      <text x="1000" y="344" fill="#aeb9c4">Rear tire contact patch</text>
    </g>

    <text x="940" y="392" fill="#e8edf2" font-size="14" font-weight="700" letter-spacing="2">WEIGHING</text>
    <g font-size="12.5">
      <text x="940" y="420" fill="#29d3e0" font-weight="700" font-family="ui-monospace, Menlo, monospace">W-F/W-R</text>
      <text x="1022" y="420" fill="#aeb9c4">Wheel loads, level ground</text>
      <text x="940" y="448" fill="#29d3e0" font-weight="700" font-family="ui-monospace, Menlo, monospace">W-F&#8242;</text>
      <text x="1000" y="448" fill="#aeb9c4">Front load, rear raised</text>
      <text x="1000" y="464" fill="#5a6672" font-size="11">&#8594; CG height (see .md)</text>
    </g>

    <g font-size="11" fill="#5a6672">
      <text x="940" y="510">SA-U / SA-L define the steering axis:</text>
      <text x="940" y="526" font-family="ui-monospace, Menlo, monospace" fill="#8a97a3">rakeDeg, forkOffsetMm = &#8869;(FA, axis)</text>
      <text x="940" y="552">Use bearing centers, not fork tube surface.</text>
    </g>
  </g>

  <!-- condition note -->
  <text x="60" y="614" fill="#5a6672" font-size="12">Condition: bike upright at reference ride height, no rider, tires at spec pressure, chain adjusters at datum. Full formulas in docs/measurement-points.md</text>
</svg>
